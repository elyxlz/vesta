[package]
name = "vesta"
version = "0.1.18"
description = "Vesta CLI for managing the personal assistant agent"
license = "MIT"
repository = "https://github.com/elyxlz/vesta"
authors = ["elyxlz"]
edition = "2021"

[[bin]]
name = "vesta"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }

[target.'cfg(target_os = "linux")'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

[target.'cfg(target_os = "macos")'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
