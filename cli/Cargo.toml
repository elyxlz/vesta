[package]
name = "vesta"
version = "0.1.65"
description = "Vesta CLI for managing the personal assistant agent"
license = "MIT"
repository = "https://github.com/elyxlz/vesta"
authors = ["elyxlz"]
edition = "2021"

[[bin]]
name = "vesta"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }

[target.'cfg(target_os = "linux")'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

[target.'cfg(target_os = "windows")'.dependencies]
serde_json = "1"

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "z"
panic = "abort"

[target.'cfg(target_os = "macos")'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
zstd = "0.13"
tar = "0.4"

[target.'cfg(target_os = "macos")'.dev-dependencies]
tempfile = "3"
