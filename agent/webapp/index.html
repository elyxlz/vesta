<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>okami</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #707070;
    --accent: #7c9bf5;
    --accent-dim: #3a4a7a;
    --green: #4ade80;
    --orange: #f59e0b;
    --red: #ef4444;
    --user-bg: #1a2744;
    --assistant-bg: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 52px;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  #status-dot.connected { background: var(--green); }
  #status-dot.connecting { background: var(--orange); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  #header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #log-toggle {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  #log-toggle:hover { border-color: var(--text-dim); }
  #log-toggle.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-dim); }

  #state-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.3s;
  }

  #state-badge.thinking {
    background: var(--accent-dim);
    color: var(--accent);
  }

  #state-badge.tool_use {
    background: #2a3a2a;
    color: var(--green);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }

  .msg {
    margin-bottom: 8px;
    max-width: 88%;
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    margin-left: 0;
  }

  .msg-bubble {
    padding: 4px 0;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg.user .msg-bubble {
    color: #ffffff;
  }

  .msg.assistant .msg-bubble {
    color: #6b8de0;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: left; }

  /* System events (errors in chat) */
  .sys-event {
    text-align: left;
    margin: 6px 0;
    animation: fadeIn 0.15s ease-out;
  }

  .sys-event-inner {
    display: inline-block;
    font-size: 15px;
    color: var(--text-dim);
    background: none;
    padding: 4px 0;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sys-event-inner.error {
    color: var(--red);
    background: #1a0d0d;
  }

  /* Log panel */
  #log-panel {
    display: none;
    flex-shrink: 0;
    height: 35%;
    border-bottom: 1px solid var(--border);
    background: #080808;
    overflow-y: auto;
    padding: 8px 12px;
    -webkit-overflow-scrolling: touch;
  }

  #log-panel.visible {
    display: block;
  }

  #log-panel::-webkit-scrollbar { width: 4px; }
  #log-panel::-webkit-scrollbar-track { background: transparent; }
  #log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .log-line.log-user { color: #ffffff; }
  .log-line.log-assistant { color: #6b8de0; }
  .log-line.log-tool { color: var(--green); }
  .log-line.log-error { color: var(--red); }
  .log-line.log-notification { color: var(--orange); }
  .log-line.log-status { color: var(--text-dim); font-style: italic; }

  /* Input area */
  #input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  #msg-input:focus {
    border-color: var(--accent-dim);
  }

  #msg-input::placeholder {
    color: var(--text-dim);
  }

  .btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #send-btn {
    background: var(--accent);
    color: #fff;
  }

  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  #interrupt-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    display: none;
  }

  #interrupt-btn.visible {
    display: flex;
  }

  #interrupt-btn:active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  #voice-toggle {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    font-size: 15px;
  }

  #voice-toggle.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  #mic-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-dim);
  }

  #mic-btn:active { transform: scale(0.92); }

  #mic-btn.recording {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    animation: pulse 1s infinite;
  }

  #rec-timer {
    display: none;
    font-size: 12px;
    color: var(--red);
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    text-align: center;
  }

  #rec-timer.visible { display: block; }

  /* Connection overlay */
  #reconnect-overlay {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-dim);
    z-index: 10;
  }

  #reconnect-overlay.visible { display: block; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="status-dot"></div>
      <span id="title">okami</span>
    </div>
    <div id="header-right">
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#707070;"><span style="width:6px;height:6px;border-radius:50%;background:#ffffff;display:inline-block;"></span>you</span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#707070;"><span style="width:6px;height:6px;border-radius:50%;background:#6b8de0;display:inline-block;"></span>okami</span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#707070;"><span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;"></span>tools</span>
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#707070;"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>notify</span>
      <button id="log-toggle">log</button>
      <span id="state-badge">offline</span>
    </div>
  </div>

  <div id="log-panel"></div>

  <div id="messages"></div>

  <div id="reconnect-overlay">reconnecting...</div>

  <div id="input-area">
    <button id="interrupt-btn" class="btn" title="Interrupt">&#9632;</button>
    <textarea id="msg-input" rows="1" placeholder="message okami..." autocomplete="off" autocorrect="on" autocapitalize="sentences"></textarea>
    <button id="voice-toggle" class="btn" title="Voice reply">🔊</button>
    <span id="rec-timer">0:00</span>
    <button id="mic-btn" class="btn" title="Voice message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button id="send-btn" class="btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  const MAX_MESSAGES = 500;
  const MAX_LOG_LINES = 1000;

  const messagesEl = document.getElementById('messages');
  const logPanel = document.getElementById('log-panel');
  const logToggle = document.getElementById('log-toggle');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const micBtn = document.getElementById('mic-btn');
  const recTimer = document.getElementById('rec-timer');
  const interruptBtn = document.getElementById('interrupt-btn');
  const voiceToggle = document.getElementById('voice-toggle');
  const statusDot = document.getElementById('status-dot');
  const stateBadge = document.getElementById('state-badge');
  const reconnectOverlay = document.getElementById('reconnect-overlay');

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;
  let agentState = 'idle';
  let messageCount = 0;
  let logVisible = false;
  let voiceReply = false;

  // Audio recording state
  let mediaRecorder = null;
  let audioChunks = [];
  let recordingStartTime = 0;
  let recTimerInterval = null;

  // Log toggle
  logToggle.addEventListener('click', () => {
    logVisible = !logVisible;
    logPanel.className = logVisible ? 'visible' : '';
    logToggle.className = logVisible ? 'active' : '';
    if (logVisible) scrollLogToBottom();
  });

  // Voice reply toggle
  voiceToggle.addEventListener('click', () => {
    voiceReply = !voiceReply;
    voiceToggle.className = voiceReply ? 'btn active' : 'btn';
  });

  function getWsUrl() {
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host || 'localhost:8080';
    return `${proto}//${host}/ws`;
  }

  function connect() {
    if (ws && ws.readyState <= 1) return;

    statusDot.className = 'connecting';
    stateBadge.textContent = 'connecting';
    stateBadge.className = '';

    try {
      ws = new WebSocket(getWsUrl());
    } catch(e) {
      scheduleReconnect();
      return;
    }

    ws.onopen = () => {
      statusDot.className = 'connected';
      reconnectOverlay.className = '';
      reconnectDelay = 1000;
      updateState('idle');
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        handleEvent(data);
      } catch(err) {}
    };

    ws.onclose = () => {
      statusDot.className = '';
      stateBadge.textContent = 'offline';
      stateBadge.className = '';
      scheduleReconnect();
    };

    ws.onerror = () => {};
  }

  function scheduleReconnect() {
    reconnectOverlay.className = 'visible';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      connect();
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
  }

  function handleEvent(data) {
    if (data.type === 'history') {
      messagesEl.innerHTML = '';
      logPanel.innerHTML = '';
      messageCount = 0;
      if (data.events) {
        data.events.forEach(ev => {
          renderEvent(ev, true);
          renderLogEvent(ev);
        });
      }
      updateState(data.state || 'idle');
      scrollToBottom();
      scrollLogToBottom();
      return;
    }
    if (data.type === 'audio_response') {
      playAudioResponse(data.data, data.mime || 'audio/ogg');
      return;
    }
    renderEvent(data, false);
    renderLogEvent(data);
    if (data.type === 'status') {
      updateState(data.state);
    }
  }

  function playAudioResponse(b64data, mime) {
    try {
      const bytes = atob(b64data);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      const blob = new Blob([arr], { type: mime });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => URL.revokeObjectURL(url);
      audio.play().catch(() => {
        addSystemEvent('tap to enable audio playback', 'notification');
      });
    } catch(e) {
      addSystemEvent('audio playback failed', 'error');
    }
  }

  // Clean chat view — only user + user-initiated assistant messages
  function renderEvent(ev, isHistory) {
    const ts = ev.ts ? formatTime(ev.ts) : '';

    switch(ev.type) {
      case 'assistant':
        if (ev.user_initiated && ev.text && !ev.text.match(/^.{0,40}(—|-)?\s*ignored\.?$/i)) {
          addMessage('assistant', ev.text, ts);
        }
        break;
      case 'user':
        if (ev.text && !ev.text.startsWith('[voice]')) {
          let displayText = ev.text.replace(/^\[voice-reply\] /, '');
          addMessage('user', displayText, ts);
        }
        break;
      case 'error':
        addSystemEvent(ev.text, 'error');
        break;
      case 'status':
        break;
      default:
        break;
    }

    if (!isHistory) {
      trimMessages();
      scrollToBottom();
    }
  }

  // Log view — mirrors console output via LogEvent from logger bridge
  const LOG_CATEGORY_CSS = {
    'INIT': 'log-status', 'SHUTDOWN': 'log-error', 'CLIENT': 'log-status',
    'DREAMER': 'log-notification', 'INTERRUPT': 'log-notification',
    'PROACTIVE': 'log-notification', 'STARTUP': 'log-status',
    'USER': 'log-user', 'ASSISTANT': 'log-assistant', 'TOOL': 'log-tool',
    'NOTIFICATION': 'log-notification', 'SYSTEM': 'log-status',
    'SUBAGENT': 'log-tool', 'SDK': 'log-status', 'USAGE': 'log-tool',
    'STATE': 'log-status', 'WARNING': 'log-notification', 'ERROR': 'log-error',
  };

  function renderLogEvent(ev) {
    if (ev.type === 'log') {
      const ts = ev.ts ? formatTime(ev.ts) : '';
      const text = (ts ? ts + ' ' : '') + (ev.text || '');
      const cls = LOG_CATEGORY_CSS[ev.category] || '';
      addLogLine(text, cls);
    } else if (ev.type === 'status') {
      const ts = ev.ts ? formatTime(ev.ts) : '';
      addLogLine((ts ? ts + ' ' : '') + '* [STATE] ' + ev.state, 'log-status');
    }
  }

  function addLogLine(text, cls) {
    const div = document.createElement('div');
    div.className = 'log-line ' + (cls || '');
    div.textContent = text;
    logPanel.appendChild(div);

    // Trim old log lines
    while (logPanel.children.length > MAX_LOG_LINES) {
      logPanel.removeChild(logPanel.firstChild);
    }

    if (logVisible) scrollLogToBottom();
  }

  function scrollLogToBottom() {
    requestAnimationFrame(() => {
      logPanel.scrollTop = logPanel.scrollHeight;
    });
  }

  function addMessage(role, text, time) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>` +
                    (time ? `<div class="msg-time">${time}</div>` : '');
    messagesEl.appendChild(div);
    messageCount++;
  }

  function addSystemEvent(text, cls) {
    const div = document.createElement('div');
    div.className = 'sys-event';
    div.innerHTML = `<span class="sys-event-inner ${cls || ''}">${escapeHtml(text)}</span>`;
    messagesEl.appendChild(div);
    messageCount++;
  }

  function updateState(state) {
    agentState = state;
    stateBadge.textContent = state;
    stateBadge.className = state;
    interruptBtn.className = (state !== 'idle') ? 'btn visible' : 'btn';
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    const payload = voiceReply ? '[voice-reply] ' + text : text;
    ws.send(JSON.stringify({ type: 'message', text: payload }));
    inputEl.value = '';
    inputEl.style.height = 'auto';
    updateSendBtn();
  }

  function sendInterrupt() {
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateSendBtn();
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  interruptBtn.addEventListener('click', sendInterrupt);
  micBtn.addEventListener('click', toggleRecording);

  function updateSendBtn() {
    sendBtn.disabled = !inputEl.value.trim();
  }

  // Audio recording
  async function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getMimeType() });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        clearInterval(recTimerInterval);
        recTimer.className = '';
        micBtn.classList.remove('recording');

        if (audioChunks.length === 0) return;
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        sendAudio(blob);
      };

      mediaRecorder.start(100);
      micBtn.classList.add('recording');
      recordingStartTime = Date.now();
      recTimer.textContent = '0:00';
      recTimer.className = 'visible';
      recTimerInterval = setInterval(updateRecTimer, 500);
    } catch(e) {
      addSystemEvent('mic access denied', 'error');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }

  function updateRecTimer() {
    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = (elapsed % 60).toString().padStart(2, '0');
    recTimer.textContent = mins + ':' + secs;
  }

  function getMimeType() {
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
    if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
    if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) return 'audio/ogg;codecs=opus';
    if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
    return '';
  }

  async function sendAudio(blob) {
    if (!ws || ws.readyState !== 1) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(',')[1];
      ws.send(JSON.stringify({
        type: 'audio',
        data: base64,
        mime: blob.type
      }));
      scrollToBottom();
    };
    reader.readAsDataURL(blob);
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function trimMessages() {
    while (messagesEl.children.length > MAX_MESSAGES) {
      messagesEl.removeChild(messagesEl.firstChild);
      messageCount--;
    }
  }

  function formatTime(isoStr) {
    try {
      const d = new Date(isoStr);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch(e) { return ''; }
  }

  function truncate(str, max) {
    return str.length > max ? str.substring(0, max) + '...' : str;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Start
  connect();

  // Reconnect on visibility change (phone wakes up)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (!ws || ws.readyState > 1) {
        connect();
      }
    }
  });
})();
