[project]
name = "what-day"
version = "0.1.0"
description = "Determine the day of the week for any date"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
what-day = "what_day_cli.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/what_day_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
