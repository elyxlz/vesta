[project]
name = "exa-cli"
version = "0.1.0"
description = "Exa AI CLI for vesta — search, answer, similar, contents, research"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[project.scripts]
exa = "exa_cli.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/exa_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
