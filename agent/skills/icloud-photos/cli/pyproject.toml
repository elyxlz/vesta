[project]
name = "icloud-cli"
version = "0.1.0"
description = "iCloud Photos CLI for vesta. Wraps pyicloud for shared album access."
requires-python = ">=3.11"
dependencies = [
    "pyicloud>=2.5.0",
    "httpx>=0.27.0",
]

[project.scripts]
icloud = "icloud_cli.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/icloud_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
