[project]
name = "tasks"
version = "0.1.0"
description = "Task management CLI with priority tracking and due dates"
readme = {text = "", content-type = "text/plain"}
authors = [
    { name = "elyxlz" }
]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
tasks = "tasks_cli.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tasks_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
