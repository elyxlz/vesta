[project]
name = "cloudflare-email"
version = "0.1.0"
description = "CLI for the cloudflare-email skill"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "httpx>=0.27",
    "click>=8.1",
    "cloudflare>=4.3",
]

[project.scripts]
cloudflare-email = "cloudflare_email.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cloudflare_email"]
