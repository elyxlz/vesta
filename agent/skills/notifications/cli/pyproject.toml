[project]
name = "notifications"
version = "0.1.0"
description = "Manage the agent's notification interrupt rules via the config API"
readme = {text = "", content-type = "text/plain"}
authors = [
    { name = "elyxlz" }
]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
notifications = "notifications_cli.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/notifications_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
