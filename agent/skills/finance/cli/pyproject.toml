[project]
name = "finance"
version = "0.2.0"
description = "Enable Banking finance CLI for tracking personal spending"
readme = {text = "", content-type = "text/plain"}
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "PyJWT>=2.8.0",
    "cryptography>=42.0.0",
]

[project.scripts]
finance = "finance_cli.cli:main"
finance-watcher = "finance_cli.transaction_watcher:serve"

[dependency-groups]
dev = [
    "pytest>=8.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/finance_cli"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
