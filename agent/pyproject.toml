[project]
name = "vesta"
version = "0.1.138"
description = "Personal assistant agent that works autonomously on your behalf"
license = "MIT"
authors = [
    { name = "elyxlz" }
]
requires-python = ">=3.12"
dependencies = [
    "aioconsole>=0.8.2",
    "aiohttp>=3.13.5",
    "claude-agent-sdk>=0.1.58",
    "pydantic>=2.13.0",
    "pydantic-settings>=2.13.1",
    "rich>=15.0.0",
    "watchfiles>=1.1.1",
]

[project.urls]
Homepage = "https://github.com/elyxlz/vesta"
Repository = "https://github.com/elyxlz/vesta"

[dependency-groups]
dev = [
    "ruff>=0.15.10",
    "pytest>=9.0.3",
    "ty>=0.0.29",
]

[tool.pytest.ini_options]
python_files = ["e2e.py", "test_*.py", "*_test.py"]
testpaths = ["tests"]
pythonpath = [".", "skills"]


[tool.ty.src]
include = ["core", "tests"]

[tool.ty.environment]
extra-paths = ["skills"]

[tool.ruff]
line-length = 144
indent-width = 4
target-version = "py312"

[tool.ruff.lint]
ignore = ["E402", "E702", "E731", "UP008", "E712"]
extend-select = ["UP"]
