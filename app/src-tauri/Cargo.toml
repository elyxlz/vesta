[package]
name = "vesta-app"
version = "0.1.0"
edition = "2021"

[lib]
name = "vesta_app"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tokio = { version = "1", features = ["full", "process"] }
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
