name: Refresh Claude Credentials

on:
  schedule:
    # Run daily at 03:00 UTC — tokens typically expire after a few days
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh OAuth token and update secret
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${CLAUDE_CREDENTIALS:-}" ]; then
            echo "No CLAUDE_CREDENTIALS secret set — skipping"
            exit 0
          fi

          REFRESH_TOKEN=$(echo "$CLAUDE_CREDENTIALS" | python3 -c "
          import sys, json
          creds = json.load(sys.stdin)
          print(creds['claudeAiOauth']['refreshToken'])
          ")

          if [ -z "$REFRESH_TOKEN" ]; then
            echo "::error::No refreshToken in credentials"
            exit 1
          fi

          # Check if token is still valid (expires more than 1 hour from now)
          NEEDS_REFRESH=$(echo "$CLAUDE_CREDENTIALS" | python3 -c "
          import sys, json, time
          creds = json.load(sys.stdin)
          expires_at = creds['claudeAiOauth']['expiresAt'] / 1000
          remaining = expires_at - time.time()
          print('yes' if remaining < 3600 else 'no')
          ")

          if [ "$NEEDS_REFRESH" = "no" ]; then
            echo "Token still valid — skipping refresh"
            exit 0
          fi

          echo "Token expiring soon — refreshing..."

          RESPONSE=$(curl -sS -X POST "https://platform.claude.com/v1/oauth/token" \
            -H "Content-Type: application/json" \
            -H "User-Agent: axios/1.13.6" \
            -d "{
              \"grant_type\": \"refresh_token\",
              \"refresh_token\": \"$REFRESH_TOKEN\",
              \"client_id\": \"9d1c250a-e61b-44d9-88ed-5944d1962f5e\"
            }")

          # Check for error
          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'access_token' in d else 1)" 2>/dev/null; then
            echo "Token refreshed successfully"
          else
            echo "::error::Refresh failed: $RESPONSE"
            exit 1
          fi

          # Build new credentials JSON
          NEW_CREDS=$(echo "$RESPONSE" | python3 -c "
          import sys, json, time
          resp = json.load(sys.stdin)
          expires_at = int((time.time() + resp.get('expires_in', 86400)) * 1000)
          creds = {
            'claudeAiOauth': {
              'accessToken': resp['access_token'],
              'expiresAt': expires_at,
            }
          }
          if 'refresh_token' in resp:
            creds['claudeAiOauth']['refreshToken'] = resp['refresh_token']
          if 'scope' in resp:
            creds['claudeAiOauth']['scopes'] = resp['scope'].split()
          print(json.dumps(creds))
          ")

          # Update the GitHub secret via gh CLI
          echo "$NEW_CREDS" | gh secret set CLAUDE_CREDENTIALS --repo "$GITHUB_REPOSITORY"
          echo "✅ CLAUDE_CREDENTIALS secret updated"
