name: Live agent tests

on:
  workflow_call:
    inputs:
      ref:
        description: Branch, tag, or commit to test
        type: string
        required: false
        default: ""
      test_filter:
        description: Cargo test name filter; empty runs the full live suite
        type: string
        required: false
        default: ""
      upgrade_from:
        description: Optional VESTA_UPGRADE_FROM release tag
        type: string
        required: false
        default: ""
      upgrade_to:
        description: Optional VESTA_UPGRADE_TO release tag
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CREDENTIALS:
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: Branch/ref to test; it must be pushed to origin
        type: string
        required: true
        default: master
      test_filter:
        description: Cargo test name filter; empty runs the full live suite
        type: string
        required: false
        default: ""
      upgrade_from:
        description: VESTA_UPGRADE_FROM tag; empty selects the prior release
        type: string
        required: false
        default: ""
      upgrade_to:
        description: VESTA_UPGRADE_TO tag; empty uses the checked-out build
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  test-live:
    name: Agent · Run live end-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Manual runs without credentials are always operator errors. A release
      # triggered from a fork cannot receive repository secrets, so preserve the
      # existing release behavior and skip explicitly in that case.
      - name: Validate Claude credentials
        id: credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
          REQUIRE_CREDENTIALS: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -z "$CLAUDE_CREDENTIALS" ]; then
            if [ "$REQUIRE_CREDENTIALS" = "true" ]; then
              echo "::error::CLAUDE_CREDENTIALS is unavailable; live tests cannot run"
              exit 1
            fi
            echo "::warning::CLAUDE_CREDENTIALS is unavailable; skipping live tests"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ok=$(printf '%s' "$CLAUDE_CREDENTIALS" | python3 -c "
          import json, sys
          json.load(sys.stdin)['claudeAiOauth']['refreshToken']
          print('ok')" 2>/dev/null || echo "invalid")
          if [ "$ok" != "ok" ]; then
            echo "::error::CLAUDE_CREDENTIALS is malformed or missing a refreshToken"
            exit 1
          fi
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_CREDENTIALS" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        if: steps.credentials.outputs.available == 'true'
        uses: ./.github/actions/install-rust

      - if: steps.credentials.outputs.available == 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true

      - name: Set up Docker Buildx
        if: steps.credentials.outputs.available == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        if: steps.credentials.outputs.available == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build vestad
        if: steps.credentials.outputs.available == 'true'
        working-directory: vestad
        run: cargo build

      - name: Run live end-to-end tests
        if: steps.credentials.outputs.available == 'true'
        uses: nick-fields/retry@v4
        env:
          # Inputs are passed through the environment instead of interpolated
          # into the command, preventing workflow-dispatch shell injection.
          TEST_FILTER: ${{ inputs.test_filter }}
          VESTA_UPGRADE_FROM: ${{ inputs.upgrade_from }}
          VESTA_UPGRADE_TO: ${{ inputs.upgrade_to }}
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local LIVE_TEST_FILTER="$TEST_FILTER" ./check.sh live
