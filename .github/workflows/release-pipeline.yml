name: Release pipeline

on:
  release:
    # release.yml creates one published prerelease event. Keeping delivery in
    # this workflow prevents release-only jobs from appearing as skipped PR checks.
    types: [published]

permissions:
  contents: read
  packages: read
  # ci.yml (called below) requests pull-requests: read; a reusable workflow
  # cannot request more than its caller grants, so grant it here too.
  pull-requests: read

concurrency:
  group: release-pipeline-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  verify-release:
    name: Release · Verify tag and version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Verify release tag matches the source version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::release tag v${TAG} does not match source version ${VERSION}"
            exit 1
          fi
          echo "Release tag matches source version ${VERSION}"

  # Reuse the same validation and platform builds as PR/master CI. Release
  # mode additionally uploads the vestad and desktop artifacts for the
  # publishing jobs below.
  validate-and-build:
    name: Release · Validate and build shared artifacts
    needs: verify-release
    uses: ./.github/workflows/ci.yml
    with:
      release_artifacts: true
    secrets: inherit

  test-live:
    name: Agent · Run live release gate
    needs: verify-release
    uses: ./.github/workflows/live-tests.yml
    with:
      ref: ${{ github.event.release.tag_name }}
    secrets:
      CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}

  # Pre-warm the arm64 agent image cache in parallel with the gates so the
  # post-gate arm64 push is nearly cache-only. amd64 is already warmed by
  # validate-and-build's inner jobs (agent-image-amd64 scope); this warms the
  # matching agent-image-arm64 scope from the same tag checkout. It never pushes.
  # continue-on-error: a cache-warming failure must never fail the release; the
  # arm64 push just cold-builds if this misses.
  warm-agent-image-arm64:
    name: Agent image · Warm arm64 build cache
    needs: verify-release
    continue-on-error: true
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build arm64 agent image and export cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          platforms: linux/arm64
          cache-from: type=gha,scope=agent-image-arm64
          cache-to: type=gha,mode=max,scope=agent-image-arm64

  test-linux:
    name: Release binaries · Run Linux smoke test
    # Needs the whole reusable CI call, not a standalone builder: the smoke test
    # must validate the exact release-built vestad binary that publish-release
    # ships, and only validate-and-build (release_artifacts: true) produces it.
    needs: [validate-and-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Linux release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vestad-x86_64-unknown-linux-gnu
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for archive in *.tar.gz; do tar -xzf "$archive"; done
          chmod +x vestad
          ./vestad --version

  # Build each arch NATIVELY (no QEMU) and push by digest. Nothing publishes
  # before the gates, so this needs both [test-linux, test-live]. cache-from only:
  # a green run must never publish an image assembled from a poisoned cross-run
  # cache, so these never cache-to. The pre-gate warm jobs (validate-and-build's
  # amd64 inner builds, warm-agent-image-arm64) populate the read-only caches.
  push-image:
    name: Agent image · Build and push (${{ matrix.label }})
    needs: [test-linux, test-live]
    if: ${{ !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux/amd64
            platform: linux/amd64
            os: ubuntu-latest
            scope: agent-image-amd64
          - label: linux/arm64
            platform: linux/arm64
            os: ubuntu-24.04-arm
            scope: agent-image-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: agent-image-digest-${{ matrix.scope }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch digests into the single multi-arch versioned tag.
  push-image-manifest:
    name: Agent image · Publish multi-arch tag
    needs: push-image
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: agent-image-digest-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          tags=()
          for digest in *; do
            tags+=("ghcr.io/${GITHUB_REPOSITORY}@sha256:${digest}")
          done
          docker buildx imagetools create -t "ghcr.io/${GITHUB_REPOSITORY}:${TAG}" "${tags[@]}"

      - name: Inspect published tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: docker buildx imagetools inspect "ghcr.io/${GITHUB_REPOSITORY}:${TAG}"

  publish-release:
    name: Release · Upload artifacts
    needs: [validate-and-build, test-live, test-linux, push-image-manifest]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Verify install scripts exist at the release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${VERSION}"
          for script in install.sh install.ps1; do
            status=$(curl -sL -o /dev/null -w '%{http_code}' "${BASE}/${script}")
            if [ "$status" != "200" ]; then
              echo "::error::${script} is missing at ${BASE}/${script} (HTTP ${status})"
              exit 1
            fi
          done

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*.exe' -o -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release/ \;
          [ "$(ls -A release)" ] || { echo "::error::no release assets found"; exit 1; }

      - name: Generate checksums
        run: |
          cd release
          find . -maxdepth 1 -type f \
            ! -name '*.yml' ! -name '*.blockmap' \
            -exec sha256sum {} + > checksums.txt

      - name: Upload assets to prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$asset" --clobber
          done

  # Gated on the release gates (test-live + test-linux, the same pair push-image
  # waits on), not on publish-release: this job reads only the release event's body
  # and builds mobile from the tag checkout, so it needs no uploaded GitHub assets.
  # Decoupling lets TestFlight delivery run in parallel with the GHCR push and asset
  # upload. Accepted tradeoff: if publish-release later fails and revert-failed-release
  # fires, a TestFlight build of a since-reverted release may already be delivered to
  # the internal (beta) group. The user accepted this beta-channel risk.
  mobile-testflight:
    name: Mobile · Build and upload to TestFlight
    needs: [test-live, test-linux]
    if: >-
      ${{ !failure() && !cancelled() &&
      contains(github.event.release.body, '<!-- mobile-delivery: testflight -->') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Set up EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      # eas workflow:run reads apps/mobile/app.config.ts locally, which needs the
      # monorepo's TypeScript toolchain installed or the read fails.
      - name: Install app deps
        run: npm --prefix apps ci

      - name: Build and deliver the tagged app to TestFlight
        working-directory: apps/mobile
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          CHANGELOG=$(printf '%s\n' "$RELEASE_BODY" | sed -n '/<!-- whats-new -->/,/<!-- \/whats-new -->/p' | sed '1d;$d')
          jq -n --arg changelog "$CHANGELOG" '{changelog: $changelog}' | \
            eas workflow:run .eas/workflows/testflight-prerelease.yml \
              --non-interactive \
              --wait

  revert-failed-release:
    name: Release · Revert failed release
    needs:
      [
        verify-release,
        validate-and-build,
        test-live,
        test-linux,
        push-image,
        push-image-manifest,
        publish-release,
        mobile-testflight,
      ]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Delete failed release and revert version bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          scripts/delete-ghcr-tag.sh "$TAG"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          git fetch origin master
          if git log origin/master -1 --pretty=%s | grep -q '^Bump version to '; then
            git reset --hard origin/master
            git revert --no-edit HEAD
            git push origin master
          else
            echo "::warning::master tip is not a version bump; leaving it for manual cleanup"
          fi
