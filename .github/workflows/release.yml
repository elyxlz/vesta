name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      message:
        description: 'User-facing "What''s new" summary shown in the app and on the changelog'
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: bump
        run: |
          CURRENT=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          IFS='.' read -r major minor patch_v <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            patch) NEW="${major}.${minor}.$((patch_v + 1))" ;;
            minor) NEW="${major}.$((minor + 1)).0" ;;
            major) NEW="$((major + 1)).0.0" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEW"

      - name: Bump version in all sources
        env:
          CURRENT: ${{ steps.bump.outputs.current }}
          NEW: ${{ steps.bump.outputs.new }}
        run: |
          sed -i "s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" agent/core/pyproject.toml
          sed -i "0,/^version = \"${CURRENT}\"/s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" vestad/Cargo.toml
          sed -i "0,/^version = \"${CURRENT}\"/s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" vestad/tests-integration/Cargo.toml
          sed -i "0,/^version = \"${CURRENT}\"/s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" cli/Cargo.toml
          sed -i "0,/^version = \"${CURRENT}\"/s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" apps/desktop/src-tauri/Cargo.toml
          sed -i "0,/^version = \"${CURRENT}\"/s|^version = \"${CURRENT}\"|version = \"${NEW}\"|" apps/mobile/src-tauri/Cargo.toml
          sed -i "s|\"version\": \"${CURRENT}\"|\"version\": \"${NEW}\"|" apps/desktop/src-tauri/tauri.conf.json
          sed -i "s|\"version\": \"${CURRENT}\"|\"version\": \"${NEW}\"|" apps/mobile/src-tauri/tauri.conf.json
          sed -i "s|\"version\": \"${CURRENT}\"|\"version\": \"${NEW}\"|" apps/web/package.json
          sed -i "s|\"version\": \"${CURRENT}\"|\"version\": \"${NEW}\"|" apps/desktop/package.json
          sed -i "s|\"version\": \"${CURRENT}\"|\"version\": \"${NEW}\"|" apps/mobile/package.json

      - name: Refresh lockfiles
        run: |
          (cd vestad && cargo check --quiet) &
          (cd cli && cargo check --quiet) &
          (cd apps/desktop/src-tauri && cargo check --quiet) &
          (cd apps/mobile/src-tauri && cargo check --quiet) &
          (cd agent && uv lock --project core --quiet) &
          wait

      - name: Commit and push
        env:
          NEW: ${{ steps.bump.outputs.new }}
        run: |
          git add -A
          git commit -m "Bump version to ${NEW}"
          git push origin master

      # With both --notes and --generate-notes, gh prepends the provided notes above
      # the auto-generated ones, so the marked whats-new block stays extractable at
      # the top of the release body (the app and landing page parse it).
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ steps.bump.outputs.tag }}
          MESSAGE: ${{ inputs.message }}
        run: |
          BODY="<!-- whats-new -->
          ${MESSAGE}
          <!-- /whats-new -->"
          gh release create "$TAG" --title "$TAG" --notes "$BODY" --generate-notes --target master --prerelease
          echo "Created prerelease $TAG"

      - name: Cleanup on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          # Undo the bump with a revert commit, not a force-push: branch protection
          # forbids force-pushes to master (allow_force_pushes: false). Only revert
          # when the bump is still the tip, so a commit that landed after it is safe.
          git fetch origin master
          if git log origin/master -1 --pretty=%s | grep -q "^Bump version to "; then
            git reset --hard origin/master
            git revert --no-edit HEAD
            git push origin master
          fi
