name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    # published only: gh release create fires created+published together, and two
    # racing runs each execute test-live (double flake exposure and token spend) while
    # either one failing deletes the release even when the other fully passed.
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel superseded runs on PRs. Master push runs must complete:
  # cancelling them makes merge-gate-ci report cancelled siblings as a
  # failure, painting a red X on every merge burst.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Harden cargo against transient crates.io registry flakes (sporadic
  # "curl failed" / partial downloads). Retry network ops well past the
  # default of 3, and disable HTTP/2 multiplexing, whose connection reuse is
  # the usual trigger for those mid-download curl errors on CI runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  # Same hardening for npm: the registry (and the GitHub-hosted tarballs some
  # deps pull) intermittently 403/502 or drop mid-download. Retry well past
  # npm's default of 2 so a single transient blip doesn't fail an install.
  # Honored by every `npm ci` / `npm install` in this workflow.
  npm_config_fetch_retries: "5"
  npm_config_fetch_retry_mintimeout: "20000"
  npm_config_fetch_retry_maxtimeout: "120000"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  # When release.yml dispatches, it (1) pushes a "Bump version to X" commit
  # to master and (2) creates a release tag. Both fire CI: a `push` event for
  # the commit and a `release` event for the tag, on different refs (so
  # different concurrency groups). The release run produces the artifacts
  # and is load-bearing; the push run is a redundant validation pass over
  # the same SHA. Skip the push run for these commits so we don't pay for
  # two parallel CIs per release.
  detect-changes:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
      agent: ${{ steps.filter.outputs.agent }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
              # vestad embeds the agent home (build.rs EMBED_DIRS/EMBED_FILES), so
              # agent-only changes can break check-vesta and must trigger it on PRs.
              - 'agent/core/**'
              - 'agent/skills/**'
              - 'agent/MEMORY.md'
              - 'agent/.gitignore'
              - 'agent/ruff.toml'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            app:
              - 'apps/**'
              - 'design/**'
              - 'scripts/sync-design-tokens.py'
              - 'scripts/sync-dashboard.sh'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            agent:
              - 'agent/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            go:
              - 'agent/skills/whatsapp/cli/**'
              - 'agent/skills/telegram/cli/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'

  # ── Version check ──────────────────────────────────────────────────────
  # Same skip as detect-changes; version-check has no `needs:` so the gate
  # has to be explicit here. Jobs with a plain `if:` skip automatically when
  # their needs are skipped. Jobs using `!failure() && !cancelled()` opt out
  # of that cascade, so they must also gate on
  # `needs.detect-changes.result == 'success'` explicitly.
  version-check:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          VESTAD=$(grep '^version = ' vestad/Cargo.toml | head -1 | cut -d'"' -f2)
          CLI=$(grep '^version = ' cli/Cargo.toml | head -1 | cut -d'"' -f2)
          TESTS=$(grep '^version = ' vestad/tests-integration/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_PKG=$(python3 -c "import json; print(json.load(open('apps/desktop/package.json'))['version'])")
          MOBILE_PKG=$(python3 -c "import json; print(json.load(open('apps/mobile/package.json'))['version'])")
          MOBILE_APP=$(sed -n 's/^  version: "\([^"]*\)",/\1/p' apps/mobile/app.config.ts)
          APP=$(python3 -c "import json; print(json.load(open('apps/web/package.json'))['version'])")

          echo "agent:         $AGENT"
          echo "vestad:        $VESTAD"
          echo "cli:           $CLI"
          echo "tests:         $TESTS"
          echo "desktop pkg:   $DESKTOP_PKG"
          echo "mobile pkg:    $MOBILE_PKG"
          echo "mobile app:    $MOBILE_APP"
          echo "app:           $APP"

          FAIL=0
          for name_val in "vestad:$VESTAD" "cli:$CLI" "tests:$TESTS" "desktop-pkg:$DESKTOP_PKG" "mobile-pkg:$MOBILE_PKG" "mobile-app:$MOBILE_APP" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Fast repo-hygiene guards (skills index, uv.lock, dashboard sync, vite base) ──
  guards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run guard checks
        run: ./check.sh guards

  # ── Agent checks (lint, types, unit + transport tests) ────────────────
  agent-tests:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # The cc_sdk e2e transport tests (tests/test_e2e_transport.py) drive a fake
      # claude TUI inside a real tmux server.
      - name: Install tmux
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          shell: bash
          command: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Run agent checks
        run: ./check.sh agent

  # ── Go checks (whatsapp + telegram CLIs) ──────────────────────────────
  go-checks:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Cache whisper.cpp static build
        uses: actions/cache@v6
        with:
          path: ~/.cache/vesta-whisper
          key: whisper-${{ hashFiles('agent/skills/whatsapp/cli/go.mod', 'agent/skills/whatsapp/cli/build-whisper.sh') }}

      - name: Run whatsapp checks
        run: ./check.sh whatsapp

      - name: Run telegram checks
        run: ./check.sh telegram

  # ── Windows install script guard ──────────────────────────────────────
  install-script-check:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Syntax-check install.ps1 (PowerShell 5.1)
        shell: powershell
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "❌ $_" }
            exit 1
          }
          Write-Host "✅ install.ps1 has no syntax errors"

      - name: Check for PowerShell 5.1 incompatibilities
        shell: powershell
        run: |
          $content = Get-Content install.ps1 -Raw
          $issues = @()
          # Join-Path with 3+ args requires PowerShell 6+
          if ($content -match 'Join-Path\s+\S+\s+"[^"]+"\s+"[^"]+"') {
            $issues += "Join-Path with 3+ arguments is not supported in PowerShell 5.1"
          }
          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Host "❌ $_" }
            exit 1
          }
          Write-Host "✅ No PowerShell 5.1 compatibility issues found"

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: |
          npm --prefix apps ci
          npm --prefix apps/mobile ci

      - name: Run web checks
        run: ./check.sh web

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # The integration suite exports multi-GB agent containers, streams them into
      # restic, and re-imports them, up to 8 tests in parallel (--test-threads=8). On a
      # stock ubuntu runner (~14 GB free on /) that exhausts the disk: docker
      # export/import, restic, and the mounted-repo git fetch fail with "no space left
      # on device", and the backup/rename tests stall until the step times out.
      # Reclaim the tens of GB of preinstalled toolchains this job never uses, and prune
      # the runner's seeded Docker images. This runs before the agent image is built, so
      # nothing the tests need is removed. Best-effort: cleanup never fails the job.
      - name: Free runner disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          docker system prune --all --force || true
          echo "Disk after cleanup:"
          df -h /

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true

      # Hermetic: the agent image is built from THIS checkout (GHA layer cache keeps it
      # fast), so integration tests exercise the PR's agent code and Dockerfile — never
      # the previously released ghcr.io :latest image.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      # These exercise a real Docker daemon, which occasionally hiccups on
      # transient container/image operations. Retry once so a single flaky op
      # doesn't fail the whole job (the build above is already cached).
      - name: Run integration tests (excludes live tests)
        id: integration
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 18
          max_attempts: 2
          retry_wait_seconds: 15
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local ./check.sh integration

      # Flakiness must be visible, not silently absorbed by the retry: surface every
      # multi-attempt run as a warning annotation + job summary so a masked race or
      # Docker flake still gets noticed.
      - name: Report flaky test retries
        if: always() && steps.integration.outputs.total_attempts > 1
        run: |
          echo "::warning title=Flaky integration tests::Integration suite needed ${{ steps.integration.outputs.total_attempts }} attempts to pass"
          {
            echo "## ⚠️ Integration test flakiness"
            echo ""
            echo "The integration suite needed **${{ steps.integration.outputs.total_attempts }} attempts** to pass."
            echo "Check the failed attempt's logs above — the retry masked a real race or Docker flake."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Live agent e2e (real Claude) — RELEASE ONLY ──────────
  # Runs a real agent container talking to real Claude via the CLAUDE_CREDENTIALS
  # OAuth secret. These are slow and spend real API tokens, so they do NOT
  # run on PRs or master pushes — only on the release event, where they gate the
  # release (the `release` and `push-image` jobs depend on this one, so a live-test
  # failure blocks publishing artifacts and the image).
  test-live:
    needs: [version-check]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true

      # Live tests must exercise the image being released, not the PREVIOUS release's
      # :latest — build it from this checkout (shares the GHA layer cache with
      # test-integration and push-image).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The live suite authenticates to Claude with the CLAUDE_CREDENTIALS secret (an OAuth blob),
      # written to ~/.claude/.credentials.json where the agent reads it. A MISSING secret (forks have
      # no repo secrets) makes the tests skip themselves. The SDK refreshes the access token at runtime
      # from the refresh token, so an expired access token is fine as long as the refresh token is live.
      - name: Write Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: |
          if [ -z "$CLAUDE_CREDENTIALS" ]; then
            echo "::warning::CLAUDE_CREDENTIALS not available (fork release?) — live e2e tests will skip"
            exit 0
          fi
          ok=$(printf '%s' "$CLAUDE_CREDENTIALS" | python3 -c "
          import sys, json
          json.load(sys.stdin)['claudeAiOauth']['refreshToken']
          print('ok')" 2>/dev/null || echo "invalid")
          if [ "$ok" != "ok" ]; then
            echo "::error::CLAUDE_CREDENTIALS is malformed or missing a refreshToken — re-seed from a fresh 'claude' login (~/.claude/.credentials.json)"
            exit 1
          fi
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_CREDENTIALS" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      - name: Run live e2e tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local ./check.sh live

  # ── Check vesta (clippy + tests) ──────────────────────────────────────
  check-vesta:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            run-vestad: true
          - target: aarch64-apple-darwin
            os: macos-latest
            run-vestad: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      # cli clippy + tests run on BOTH platforms: the CLI ships to macOS users, so its
      # tests must run there too, not just be cross-compiled.
      - name: Check cli (clippy + tests)
        run: TARGET=${{ matrix.target }} ./check.sh cli

      - name: Check vestad (clippy + tests, Linux only)
        if: matrix.run-vestad
        run: TARGET=${{ matrix.target }} ./check.sh vestad

      # Hermetic: the #[ignore] Docker tests run against an image built from this
      # checkout, not the released ghcr.io :latest.
      - name: Set up Docker Buildx
        if: matrix.run-vestad
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        if: matrix.run-vestad
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker integration tests (vestad, Linux only)
        if: matrix.run-vestad
        run: VESTAD_AGENT_IMAGE=vesta:local ./check.sh vestad-docker

  # ── Build vesta client (all unix targets) ─────────────────────────────
  # Pure build job: clippy + tests live in check-vesta (and check-windows), which also
  # run on non-PR events — duplicating them here just slowed releases down.
  build-vesta:
    needs: [version-check]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-aarch64-unknown-linux-gnu
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vesta-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vesta-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p cli/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> cli/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> cli/.cargo/config.toml

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp cli/target/${{ matrix.target }}/release/vesta staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.app == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries; build natively per arch
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: vestad-aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: vestad
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build vestad
        working-directory: vestad
        # No CLOUDFLARE_* here: vestad no longer bakes a Cloudflare token into the
        # binary. Self-hosters bring their own (`vestad tunnel login`); managed VMs
        # get a control-plane-seeded tunnel.json. Nothing fleet-wide ships in the
        # public binary.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp vestad/target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Test Linux (vestad HTTP API) ──────────────────────────────────────
  test-linux:
    needs: [build-vestad, build-vesta]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{vestad-x86_64-unknown-linux-gnu,vesta-x86_64-unknown-linux-gnu}"
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for f in *.tar.gz; do tar -xzf "$f"; done
          chmod +x vestad vesta
          ./vestad --version
          ./vesta --version

  # ── Windows checks (clippy + tests, runs on PRs too) ─────────────────
  # The CLI ships to Windows users; its tests must actually run on Windows,
  # not just be lint-checked there.
  check-windows:
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Check cli (clippy + tests)
        shell: bash
        run: TARGET=x86_64-pc-windows-msvc ./check.sh cli

  # ── Build Windows CLI (native MSVC) ──────────────────────────────────
  build-windows:
    needs: [version-check, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      needs.detect-changes.outputs.cli == 'true' ||
      github.event_name != 'pull_request'
      )
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke test
        shell: bash
        run: |
          CLI="cli/target/x86_64-pc-windows-msvc/release/vesta.exe"
          "$CLI" --version
          "$CLI" --help

      - name: Package Windows CLI zip
        shell: bash
        run: |
          mkdir vesta-windows
          cp cli/target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli-exe
          path: cli/target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Electron app (macOS, universal) ────────────────────────────
  build-electron-macos:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      # electron-builder auto-skips signing on pull_request builds, but on a
      # push it attempts to sign and fails when no cert is configured. Key the
      # signed path on the cert being present: with a cert, sign + notarize;
      # without one, force an unsigned build so master stays green until the
      # Apple secrets are added, after which the signed path engages with no
      # further change.
      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx tsc
          if [ -n "$CSC_LINK" ]; then
            npx electron-builder --mac dmg zip --universal --publish never
          else
            echo "No signing certificate configured; building unsigned."
            # The empty secrets above still define the env vars: electron-builder resolves an
            # empty CSC_LINK against the project dir and dies with "not a file" on non-PR
            # events (PR builds skip signing wholesale, so only push/release hit it). Unset
            # them so the unsigned path is genuinely unsigned.
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            CSC_IDENTITY_AUTO_DISCOVERY=false \
              npx electron-builder --mac dmg zip --universal --publish never -c.mac.notarize=false
          fi

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.dmg apps/desktop/dist/*.zip apps/desktop/dist/*.blockmap apps/desktop/dist/latest-mac.yml electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: electron-darwin-universal
          path: electron-out/*

  # ── Build Electron app (Linux) ────────────────────────────────────────
  build-electron-linux:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      - name: Build Electron app
        working-directory: apps/desktop
        run: |
          npx tsc
          npx electron-builder --linux deb rpm --${{ matrix.arch }} --publish never

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.deb apps/desktop/dist/*.rpm electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: electron-linux-${{ matrix.arch }}
          path: electron-out/*

  # ── Build Electron app (Windows) ──────────────────────────────────────
  build-electron-windows:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      - name: Build Electron app
        working-directory: apps/desktop
        shell: bash
        run: |
          npx tsc
          npx electron-builder --win nsis --x64 --publish never

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.exe apps/desktop/dist/*.blockmap apps/desktop/dist/latest.yml electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: electron-win32-x64
          path: electron-out/*

  # ── Merge gate (single required check for branch protection) ─────────
  merge-gate-ci:
    if: always()
    needs:
      - version-check
      - guards
      - agent-tests
      - go-checks
      - install-script-check
      - test-frontend
      - test-integration
      - check-vesta
      - build-vesta
      - build-vestad
      - test-linux
      - check-windows
      - build-windows
      - build-electron-macos
      - build-electron-linux
      - build-electron-windows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  # ── Push Docker image (release only) ─────────────────────────────────
  # Gated on test-live: a live-test failure (via !failure() over needs) skips the
  # image push, so a broken agent is never published to :latest.
  push-image:
    needs: [test-linux, test-live]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Beta publish pushes only the version tag. `:latest` is moved onto this
          # digest later by promote.yml, so stable agents (which pull `:vX.Y.Z`
          # pinned to the vestad version) are unaffected until promotion.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Upload artifacts to release and publish ──────────────────────────
  release:
    needs:
      [
        build-vesta,
        build-vestad,
        test-frontend,
        test-integration,
        test-live,
        test-linux,
        build-windows,
        build-electron-macos,
        build-electron-linux,
        build-electron-windows,
        push-image,
      ]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Verify install scripts exist at tagged version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          REPO="elyxlz/vesta"
          BASE="https://raw.githubusercontent.com/${REPO}/${VERSION}"
          for script in install.sh install.ps1; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${BASE}/${script}")
            if [ "$STATUS" != "200" ]; then
              echo "::error::${script} not found at ${BASE}/${script} (HTTP ${STATUS})"
              exit 1
            fi
            echo "✓ ${script} exists at ${VERSION}"
          done

      - name: Collect release assets
        run: |
          mkdir release
          # latest*.yml + *.blockmap are electron-updater's feed metadata and
          # differential-download indexes; the app's exact-version feed reads
          # them from the release's download URL.
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*.exe' -o -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum $(ls | grep -v '\.yml$\|\.blockmap$') > checksums.txt

      # Beta publish: upload assets to the release but leave it a prerelease. Only
      # opted-in beta clients follow prereleases; stable stays put until promote.yml
      # flips this release to latest. This is the canary window.
      - name: Upload assets to prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
          echo "Uploaded assets to prerelease ${{ github.event.release.tag_name }}."
          echo "Run ./promote.sh ${{ github.event.release.tag_name }} to release it to stable."

  # ── Revert a failed release ───────────────────────────────────────────
  # release.sh creates the GitHub release BEFORE CI runs, so a failure (e.g.
  # test-live) leaves a published-but-asset-less release. Updaters that follow
  # prereleases then pick it up and 404 on the missing binary. Delete the
  # release and its tag, AND revert the "Bump version to X" commit release.yml
  # pushed to master — otherwise the version is stranded (master sits at the
  # bumped version with no release, and the next ./release.sh skips to the next
  # patch). Reverting it lets a re-run retry the same version.
  revert-failed-release:
    needs:
      [
        build-vesta,
        build-vestad,
        test-frontend,
        test-integration,
        test-live,
        test-linux,
        build-windows,
        build-electron-macos,
        build-electron-linux,
        build-electron-windows,
        push-image,
        release,
      ]
    if: ${{ failure() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Delete the failed release and revert the bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "::warning::release CI failed for ${TAG} — deleting the release and its tag so updaters cannot pick up an asset-less release. Re-run ./release.sh after fixing to retry ${TAG}."
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          # Undo the bump with a revert commit, not a force-push: branch protection
          # forbids force-pushes to master (allow_force_pushes: false). Only revert
          # when the bump is still the tip, so a commit that landed after it is safe.
          git fetch origin master
          if git log origin/master -1 --pretty=%s | grep -q "^Bump version to "; then
            git reset --hard origin/master
            git revert --no-edit HEAD
            git push origin master
          else
            echo "::warning::master tip is not a 'Bump version to' commit — leaving it for manual cleanup."
          fi
