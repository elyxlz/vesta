name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NSIS_VERSION: "3.11"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
            app:
              - 'apps/**'
            agent:
              - 'agent/**'

  # ── Version check ──────────────────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          VESTAD=$(grep '^version = ' vestad/Cargo.toml | head -1 | cut -d'"' -f2)
          CLI=$(grep '^version = ' cli/Cargo.toml | head -1 | cut -d'"' -f2)
          TESTS=$(grep '^version = ' vestad/tests-integration/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_CONF=$(python3 -c "import json; print(json.load(open('apps/desktop/src-tauri/tauri.conf.json'))['version'])")
          DESKTOP_CARGO=$(grep '^version = ' apps/desktop/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_PKG=$(python3 -c "import json; print(json.load(open('apps/desktop/package.json'))['version'])")
          MOBILE_CONF=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          MOBILE_CARGO=$(grep '^version = ' apps/mobile/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          MOBILE_PKG=$(python3 -c "import json; print(json.load(open('apps/mobile/package.json'))['version'])")
          APP=$(python3 -c "import json; print(json.load(open('apps/web/package.json'))['version'])")

          echo "agent:         $AGENT"
          echo "vestad:        $VESTAD"
          echo "cli:           $CLI"
          echo "tests:         $TESTS"
          echo "desktop.conf:  $DESKTOP_CONF"
          echo "desktop cargo: $DESKTOP_CARGO"
          echo "desktop pkg:   $DESKTOP_PKG"
          echo "mobile.conf:   $MOBILE_CONF"
          echo "mobile cargo:  $MOBILE_CARGO"
          echo "mobile pkg:    $MOBILE_PKG"
          echo "app:           $APP"

          FAIL=0
          for name_val in "vestad:$VESTAD" "cli:$CLI" "tests:$TESTS" "desktop.conf:$DESKTOP_CONF" "desktop-cargo:$DESKTOP_CARGO" "desktop-pkg:$DESKTOP_PKG" "mobile.conf:$MOBILE_CONF" "mobile-cargo:$MOBILE_CARGO" "mobile-pkg:$MOBILE_PKG" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Skills index auto-update ──────────────────────────────────────────
  skills-index-check:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check skills index is up to date
        run: |
          uv run python agent/skills/generate-index.py
          git diff --exit-code agent/skills/index.json || (echo "skills/index.json is stale — run 'uv run python agent/skills/generate-index.py' and commit the result" && exit 1)

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        working-directory: apps
        run: npm ci

      - name: Lint
        working-directory: apps
        run: npm -w @vesta/web run lint

      - name: Format check
        working-directory: apps
        run: npm -w @vesta/web run format:check

      - name: Type check
        working-directory: apps
        run: npm -w @vesta/web run check

      - name: Run tests
        working-directory: apps
        run: npm -w @vesta/web run test

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent image
        run: docker pull ghcr.io/elyxlz/vesta:latest

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      - name: Run integration tests (excludes live tests)
        working-directory: vestad
        run: cargo test -p vesta-tests --test server --test multi_user --test oauth --test migrations -- --test-threads=8

  # ── Check vesta (clippy + tests, PRs only) ────────────────────────────
  check-vesta:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            run-tests: true
            run-vestad: true
          - target: aarch64-apple-darwin
            os: macos-latest
            run-tests: false
            run-vestad: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      - name: Clippy (cli)
        working-directory: cli
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Clippy (vestad, Linux only)
        if: matrix.run-vestad
        working-directory: vestad
        run: cargo clippy -p vestad --target ${{ matrix.target }} -- -D warnings

      - name: Test (cli)
        if: matrix.run-tests
        working-directory: cli
        run: cargo test --target ${{ matrix.target }}

      - name: Test (vestad, Linux only)
        if: matrix.run-vestad
        working-directory: vestad
        run: cargo test -p vestad --target ${{ matrix.target }}

      - name: Docker integration tests (vestad, Linux only)
        if: matrix.run-vestad
        working-directory: vestad
        run: |
          docker pull ghcr.io/elyxlz/vesta:latest
          cargo test -p vestad --target ${{ matrix.target }} -- --ignored

  # ── Build vesta client (all unix targets) ─────────────────────────────
  build-vesta:
    needs: [version-check]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-aarch64-unknown-linux-gnu
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vesta-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vesta-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p cli/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> cli/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> cli/.cargo/config.toml

      - name: Clippy (cli)
        if: "!matrix.cross"
        working-directory: cli
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Clippy (vestad, Linux only)
        if: "!matrix.cross && runner.os == 'Linux'"
        working-directory: vestad
        run: cargo clippy -p vestad --target ${{ matrix.target }} -- -D warnings

      - name: Test (cli)
        if: "!matrix.cross"
        working-directory: cli
        run: cargo test --target ${{ matrix.target }}

      - name: Test (vestad, Linux only)
        if: "!matrix.cross && runner.os == 'Linux'"
        working-directory: vestad
        run: cargo test -p vestad --target ${{ matrix.target }}

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp cli/target/${{ matrix.target }}/release/vesta staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.app == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries; build natively per arch
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: vestad-aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vestad
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build vestad
        working-directory: vestad
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp vestad/target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Test Linux (vestad HTTP API) ──────────────────────────────────────
  test-linux:
    needs: [build-vestad, build-vesta]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{vestad-x86_64-unknown-linux-gnu,vesta-x86_64-unknown-linux-gnu}"
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for f in *.tar.gz; do tar -xzf "$f"; done
          chmod +x vestad vesta
          ./vestad --version
          ./vesta --version

  # ── Windows Clippy (runs on PRs too) ─────────────────────────────────
  clippy-windows:
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Clippy
        working-directory: cli
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

  # ── Build Windows CLI (native MSVC) ──────────────────────────────────
  build-windows:
    needs: [version-check, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      needs.detect-changes.outputs.cli == 'true' ||
      github.event_name != 'pull_request'
      )
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke test
        shell: bash
        run: |
          CLI="cli/target/x86_64-pc-windows-msvc/release/vesta.exe"
          "$CLI" --version
          "$CLI" --help

      - name: Package Windows CLI zip
        shell: bash
        run: |
          mkdir vesta-windows
          cp cli/target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli-exe
          path: cli/target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Tauri app (macOS) ───────────────────────────────────────────
  build-tauri-macos:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: dmg
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          ARCH_PREFIX=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          for f in tauri-out/Vesta.app.tar.gz*; do
            [ -f "$f" ] && mv "$f" "${f/Vesta.app/Vesta_${ARCH_PREFIX}.app}"
          done
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Linux — needs vestad bundled) ──────────────────
  build-tauri-linux:
    needs: [test-frontend, detect-changes, build-vestad]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bundles: deb,rpm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bundles: deb,rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Bundle vestad
        uses: actions/download-artifact@v8
        with:
          name: vestad-${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
          path: /tmp/vestad-artifact

      - name: Install vestad into resources
        run: |
          tar -xzf /tmp/vestad-artifact/vestad-*.tar.gz -C /tmp/vestad-artifact/
          mkdir -p apps/desktop/src-tauri/resources
          cp /tmp/vestad-artifact/vestad apps/desktop/src-tauri/resources/vestad
          chmod +x apps/desktop/src-tauri/resources/vestad

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Windows) ─────────────────────────────────────────
  build-tauri-windows:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache NSIS
        id: cache-nsis
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\tauri\NSIS
          key: nsis-${{ env.NSIS_VERSION }}

      - name: Pre-install NSIS
        if: steps.cache-nsis.outputs.cache-hit != 'true'
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/nsis.zip \
            "https://github.com/tauri-apps/binary-releases/releases/download/nsis-${NSIS_VERSION}/nsis-${NSIS_VERSION}.zip"
          unzip -qo /tmp/nsis.zip -d "$NSIS_DIR"
          rm /tmp/nsis.zip

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p tauri-out
          cp apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe tauri-out/
          # The updater artifact (.nsis.zip) is what the updater plugin downloads;
          # without it, the release manifest signature is empty and Windows fails
          # with "update failed". createUpdaterArtifacts in tauri.conf.json enables it.
          find apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle \
            -type f \( -name '*.nsis.zip' -o -name '*.sig' \) -exec cp {} tauri-out/ \;

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-x86_64-pc-windows-msvc
          path: tauri-out/*

  # ── Build Tauri app (Android APK) ────────────────────────────────────
  build-tauri-android:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/mobile/src-tauri
          key: android

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Initialize Android project
        working-directory: apps/mobile
        run: npx tauri android init

      # Set up release signing if the ANDROID_KEYSTORE_BASE64 secret is configured.
      # If the secret is missing, the next step falls back to a debug-signed APK
      # so CI doesn't break (debug APKs install on-device but can't be used for
      # real Play Store updates because Android tracks signing certs per app).
      - name: Set up release signing
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building debug-signed APK (not suitable for Play Store updates)"
            exit 0
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > apps/mobile/src-tauri/gen/android/keystore.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          EOF
          python3 scripts/android-sign-patch.py apps/mobile/src-tauri/gen/android/app/build.gradle.kts
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        working-directory: apps/mobile
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            npx tauri android build --apk
          else
            npx tauri android build --apk --debug
          fi

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/mobile/src-tauri/gen/android -name '*.apk' -exec cp {} tauri-out/ \;
          VERSION=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          SUFFIX=""
          if [ "${{ steps.signing.outputs.signed }}" != "true" ]; then
            SUFFIX="-debug"
          fi
          for f in tauri-out/*.apk; do
            mv "$f" "tauri-out/Vesta_${VERSION}${SUFFIX}.apk"
          done
          ls -lh tauri-out/

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-android
          path: tauri-out/*

  # ── Build Tauri app (iOS) ────────────────────────────────────────────
  build-tauri-ios:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: macos-latest
    steps:
      - name: Check for Apple signing secrets
        env:
          HAS_SECRETS: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          if [ "$HAS_SECRETS" != "true" ]; then
            echo "::warning::Apple signing secrets not configured — skipping iOS build"
            echo "SKIP_IOS=true" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v6
        if: env.SKIP_IOS != 'true'

      - name: Install Rust
        if: env.SKIP_IOS != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        if: env.SKIP_IOS != 'true'
        with:
          workspaces: apps/mobile/src-tauri
          key: ios

      - name: Setup Node
        if: env.SKIP_IOS != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Apple certificate and provisioning profile
        if: env.SKIP_IOS != 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install frontend deps
        if: env.SKIP_IOS != 'true'
        working-directory: apps
        run: npm install

      - name: Initialize iOS project
        if: env.SKIP_IOS != 'true'
        working-directory: apps/mobile
        run: npx tauri ios init

      - name: Build iOS
        if: env.SKIP_IOS != 'true'
        working-directory: apps/mobile
        run: npx tauri ios build --export-method app-store-connect

      - name: Collect artifacts
        if: env.SKIP_IOS != 'true'
        run: |
          mkdir -p tauri-out
          find apps/mobile/src-tauri/gen/apple -name '*.ipa' -exec cp {} tauri-out/ \;
          VERSION=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          for f in tauri-out/*.ipa; do
            mv "$f" "tauri-out/Vesta_${VERSION}.ipa"
          done
          ls -lh tauri-out/

      - name: Upload to TestFlight
        if: env.SKIP_IOS != 'true' && github.event_name == 'release'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file tauri-out/Vesta_*.ipa \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - uses: actions/upload-artifact@v7
        if: env.SKIP_IOS != 'true'
        with:
          name: tauri-ios
          path: tauri-out/*

      - name: Clean up keychain
        if: env.SKIP_IOS != 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  # ── Merge gate (single required check for branch protection) ─────────
  merge-gate-ci:
    if: always()
    needs:
      - version-check
      - skills-index-check
      - test-frontend
      - test-integration
      - check-vesta
      - build-vesta
      - build-vestad
      - test-linux
      - clippy-windows
      - build-windows
      - build-tauri-macos
      - build-tauri-linux
      - build-tauri-windows
      - build-tauri-android
      - build-tauri-ios
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

  # ── Push Docker image (release only) ─────────────────────────────────
  push-image:
    needs: [test-linux]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Upload artifacts to release and publish ──────────────────────────
  release:
    needs: [build-vesta, build-vestad, test-frontend, test-integration, test-linux, build-windows, build-tauri-macos, build-tauri-linux, build-tauri-windows, build-tauri-android, build-tauri-ios, push-image]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Verify install scripts exist at tagged version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          REPO="elyxlz/vesta"
          BASE="https://raw.githubusercontent.com/${REPO}/${VERSION}"
          for script in install.sh install.ps1; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${BASE}/${script}")
            if [ "$STATUS" != "200" ]; then
              echo "::error::${script} not found at ${BASE}/${script} (HTTP ${STATUS})"
              exit 1
            fi
            echo "✓ ${script} exists at ${VERSION}"
          done

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*-setup.exe' -o -name '*_x64-setup.exe' -o \
            -name '*.nsis.zip' -o \
            -name '*.apk' -o -name '*.ipa' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate updater manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          REPO="elyxlz/vesta"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Tauri updater platform keys: {os}-{arch}
          # macOS uses .app.tar.gz, Windows uses .nsis.zip
          # Linux uses script-based self-update (not Tauri updater)
          cat > release/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/Vesta_aarch64.app.tar.gz",
                "signature": "$(read_sig Vesta_aarch64.app.tar.gz.sig)"
              },
              "darwin-x86_64": {
                "url": "${BASE}/Vesta_x86_64.app.tar.gz",
                "signature": "$(read_sig Vesta_x86_64.app.tar.gz.sig)"
              },
              "windows-x86_64": {
                "url": "${BASE}/Vesta_${VERSION}_x64-setup.nsis.zip",
                "signature": "$(read_sig Vesta_${VERSION}_x64-setup.nsis.zip.sig)"
              }
            }
          }
          MANIFEST
          sed -i 's/^          //' release/latest.json
          echo "Generated latest.json:"
          cat release/latest.json

      - name: Generate checksums
        run: |
          cd release
          sha256sum $(ls | grep -v '\.sig$\|\.json$') > checksums.txt

      - name: Upload assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
          gh release edit "${{ github.event.release.tag_name }}" --draft=false --prerelease=false

      - name: Push to production
        run: git push --force origin HEAD:production
