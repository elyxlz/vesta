name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  VFKIT_VERSION: "0.6.0"
  NSIS_VERSION: "3.11"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
              - 'vesta-common/**'
              - 'vm/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            app:
              - 'app/**'

  # ── Version check ──────────────────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          CLI=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          TAURI_CONF=$(python3 -c "import json; print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")
          TAURI_CARGO=$(grep '^version = ' app/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          APP=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")

          echo "agent:       $AGENT"
          echo "cli:         $CLI"
          echo "tauri.conf:  $TAURI_CONF"
          echo "tauri cargo: $TAURI_CARGO"
          echo "app:         $APP"

          FAIL=0
          for name_val in "cli:$CLI" "tauri.conf:$TAURI_CONF" "tauri-cargo:$TAURI_CARGO" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Skills index auto-update ──────────────────────────────────────────
  skills-index-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check skills index is up to date
        run: |
          uv run python agent/skills/generate-index.py
          git diff --exit-code agent/skills/index.json || (echo "skills/index.json is stale — run 'uv run python agent/skills/generate-index.py' and commit the result" && exit 1)

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Type check
        working-directory: app
        run: npm run check

      - name: Run tests
        working-directory: app
        run: npm test

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent image
        run: docker pull ghcr.io/elyxlz/vesta:latest

      - name: Build vestad
        run: cargo build -p vestad

      - name: Run integration tests
        run: cargo test -p vesta-common --features integration -- --test-threads=1

  # ── Build vesta client (all unix targets) ─────────────────────────────
  build-vesta:
    needs: [version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-aarch64-unknown-linux-gnu
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vesta-aarch64-apple-darwin
            vfkit: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vesta-x86_64-apple-darwin
            vfkit: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Clippy
        if: "!matrix.cross"
        working-directory: .
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

      - name: Test
        if: "!matrix.cross"
        working-directory: .
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Build vesta
        working-directory: .
        run: cargo build --release -p vesta --target ${{ matrix.target }}

      - name: Download vfkit
        if: matrix.vfkit
        run: |
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o /tmp/vfkit \
            "https://github.com/crc-org/vfkit/releases/download/v${VFKIT_VERSION}/vfkit"
          chmod +x /tmp/vfkit

      - name: Package
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/vesta staging/
          if [ -f /tmp/vfkit ]; then
            cp /tmp/vfkit staging/
          fi
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries (vestad runs in Alpine VM/WSL with musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-aarch64-unknown-linux-gnu
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build vestad
        working-directory: .
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p vestad --target ${{ matrix.target }}
          else
            cargo build --release -p vestad --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Test Linux (vestad HTTP API) ──────────────────────────────────────
  test-linux:
    needs: [build-vestad, build-vesta]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{vestad-x86_64-unknown-linux-gnu,vesta-x86_64-unknown-linux-gnu}"
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for f in *.tar.gz; do tar -xzf "$f"; done
          chmod +x vestad vesta
          ./vestad --version
          ./vesta --version

  # ── Test macOS CLI ────────────────────────────────────────────────────
  test-macos:
    needs: [build-vesta, build-vm-image]
    if: ${{ !failure() && !cancelled() }}
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Download CLI
        uses: actions/download-artifact@v8
        with:
          name: vesta-aarch64-apple-darwin
          path: .

      - name: Extract
        run: |
          mkdir -p cli-extract
          tar -xzf vesta-aarch64-apple-darwin.tar.gz -C cli-extract
          chmod +x cli-extract/vesta cli-extract/vfkit

      - name: E2E test
        run: |
          set -euo pipefail
          CLI="cli-extract/vesta"

          echo "=== basic commands ==="
          "$CLI" --version
          "$CLI" --help

          echo "=== verify vfkit ==="
          ls -la cli-extract/vfkit
          file cli-extract/vfkit

      - name: Ad-hoc sign and verify
        run: |
          codesign --force --sign - cli-extract/vesta
          codesign --force --sign - cli-extract/vfkit
          codesign --verify --verbose cli-extract/vesta
          codesign --verify --verbose cli-extract/vfkit

      # Test VM image extraction + CLI integration (non-PR only)
      - name: Download VM image
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: vm-image-arm64
          path: .

      - name: Test VM image and CLI integration
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          CLI="cli-extract/vesta"
          DATA_DIR="$HOME/Library/Application Support/vesta"
          mkdir -p "$DATA_DIR"

          # Extract VM image and place in data dir (simulates successful download+extraction)
          tar --zstd -xf vesta-vm-arm64.tar.zst -C "$DATA_DIR"
          for f in vm-kernel vm-initrd vm-disk.raw; do
            test -s "$DATA_DIR/$f" || { echo "FAIL: $f missing"; exit 1; }
          done
          echo "VM image files OK"

          # setup will skip download (files exist), generate SSH key, try to boot vfkit (will fail)
          "$CLI" setup --name ci-test --yes 2>&1 || true

          # Verify SSH key was generated
          test -f "$DATA_DIR/ssh_key" || { echo "FAIL: SSH key not generated"; exit 1; }
          test -f "$DATA_DIR/ssh_key.pub" || { echo "FAIL: SSH public key not generated"; exit 1; }
          echo "SSH key generation OK"

          # vfkit can't run in CI, so no server is configured — status should fail gracefully
          if STATUS=$("$CLI" status ci-test --json 2>&1); then
            echo "$STATUS"
            echo "$STATUS" | jq -e '.status == "not_found"'
          else
            echo "$STATUS" | grep -qi "no server configured\|server not running\|connection" \
              || { echo "FAIL: unexpected error: $STATUS"; exit 1; }
            echo "status correctly reports server unreachable (expected in CI)"
          fi
          echo "all macOS integration tests passed"

  # ── Build VM images ─────────────────────────────────────────────────
  build-vm-image:
    needs: [build-vestad, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            vestad-artifact: vestad-x86_64-unknown-linux-gnu
          - arch: arm64
            vestad-artifact: vestad-aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v4

      - name: Download vestad
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.vestad-artifact }}
          path: .

      - name: Extract vestad binary
        run: |
          mkdir -p /tmp/vestad-extract
          tar -xzf ${{ matrix.vestad-artifact }}.tar.gz -C /tmp/vestad-extract
          cp /tmp/vestad-extract/vestad vm/vestad

      - name: Build VM Docker image
        run: docker build --platform linux/${{ matrix.arch }} --build-arg INCLUDE_KERNEL=true -t vesta-vm -f vm/Dockerfile vm

      - name: Export rootfs and create VM disk image
        run: |
          CONTAINER=$(docker create --platform linux/${{ matrix.arch }} vesta-vm)

          docker export "$CONTAINER" > /tmp/rootfs.tar
          docker rm "$CONTAINER" > /dev/null

          truncate -s 2G /tmp/vm-disk.raw
          mkfs.ext4 -q /tmp/vm-disk.raw
          MOUNT_DIR=$(mktemp -d)
          sudo mount /tmp/vm-disk.raw "$MOUNT_DIR"
          trap "sudo umount '$MOUNT_DIR' 2>/dev/null; rmdir '$MOUNT_DIR' 2>/dev/null" EXIT
          sudo tar -xf /tmp/rootfs.tar -C "$MOUNT_DIR"

          VMLINUZ="$MOUNT_DIR/boot/vmlinuz-virt"
          INITRD="$MOUNT_DIR/boot/initramfs-virt"

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # ARM64: vfkit needs an uncompressed kernel Image.
            # Debian ARM64 vmlinuz may be uncompressed already or gzip-wrapped in an EFI stub.
            sudo python3 -c "
          import zlib, shutil
          d = open('$VMLINUZ', 'rb').read()
          off = 0
          while True:
              off = d.find(b'\x1f\x8b\x08', off)
              if off < 0:
                  break
              try:
                  raw = zlib.decompressobj(zlib.MAX_WBITS | 16).decompress(d[off:])
                  if len(raw) > 1024 * 1024:
                      open('/tmp/vm-kernel', 'wb').write(raw)
                      raise SystemExit(0)
              except zlib.error:
                  pass
              off += 1
          shutil.copy('$VMLINUZ', '/tmp/vm-kernel')
          "
          else
            sudo cp "$VMLINUZ" /tmp/vm-kernel
          fi
          sudo cp "$INITRD" /tmp/vm-initrd

          sudo umount "$MOUNT_DIR"
          rmdir "$MOUNT_DIR"
          trap - EXIT
          sudo chown "$(id -u):$(id -g)" /tmp/vm-kernel /tmp/vm-initrd /tmp/vm-disk.raw
          for f in /tmp/vm-kernel /tmp/vm-initrd /tmp/vm-disk.raw; do
            test -s "$f" || { echo "FATAL: $f is empty"; exit 1; }
          done

          cd /tmp
          tar --zstd -cf vesta-vm-${{ matrix.arch }}.tar.zst vm-kernel vm-initrd vm-disk.raw
          rm -f /tmp/rootfs.tar /tmp/vm-kernel /tmp/vm-initrd /tmp/vm-disk.raw

      - name: Build and export WSL rootfs
        if: matrix.arch == 'amd64'
        run: |
          docker build --build-arg INCLUDE_NVIDIA=true -t vesta-wsl -f vm/Dockerfile vm
          CONTAINER=$(docker create vesta-wsl)
          docker export "$CONTAINER" | gzip > /tmp/vesta-wsl-rootfs.tar.gz
          docker rm "$CONTAINER" > /dev/null

      - uses: actions/upload-artifact@v7
        with:
          name: vm-image-${{ matrix.arch }}
          path: /tmp/vesta-vm-${{ matrix.arch }}.tar.zst

      - uses: actions/upload-artifact@v7
        if: matrix.arch == 'amd64'
        with:
          name: wsl-rootfs
          path: /tmp/vesta-wsl-rootfs.tar.gz

      - name: Clean up
        run: rm -f vm/vestad

  # ── Windows Clippy (runs on PRs too) ─────────────────────────────────
  clippy-windows:
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: x86_64-pc-windows-msvc

      - name: Clippy
        working-directory: .
        run: cargo clippy -p vesta --target x86_64-pc-windows-msvc -- -D warnings

  # ── Build + Test Windows CLI (native MSVC) ───────────────────────────
  build-test-windows:
    needs: [build-vm-image, clippy-windows, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      needs.detect-changes.outputs.cli == 'true' ||
      github.event_name != 'pull_request'
      )
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: x86_64-pc-windows-msvc

      - name: Build vesta
        working-directory: .
        run: cargo build --release -p vesta --target x86_64-pc-windows-msvc

      - name: Download rootfs
        uses: actions/download-artifact@v8
        with:
          name: wsl-rootfs
          path: .

      - name: E2E test
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          CLI="target/x86_64-pc-windows-msvc/release/vesta.exe"
          VESTAD="/usr/local/bin/vestad"

          cleanup() {
            echo "=== Cleanup ==="
            wsl.exe --unregister vesta-wsl 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "=== windows cli basics ==="
          "$CLI" --version
          "$CLI" --help

          echo "=== verify rootfs ==="
          ls -la vesta-wsl-rootfs.tar.gz
          file vesta-wsl-rootfs.tar.gz

          echo "=== WSL import ==="
          INSTALL_DIR="$LOCALAPPDATA\\vesta-wsl-test"
          mkdir -p "$INSTALL_DIR"
          wsl.exe --import vesta-wsl "$INSTALL_DIR" vesta-wsl-rootfs.tar.gz --version 2
          echo "import succeeded"

          echo "=== distro health ==="
          MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec /bin/true
          echo "distro is healthy"

          echo "=== vestad inside WSL ==="
          MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec $VESTAD --version
          MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec $VESTAD --help

          echo "=== start entrypoint for docker ==="
          MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec /entrypoint.sh &
          ENTRY_PID=$!

          echo "=== wait for docker ==="
          for i in $(seq 1 30); do
            if MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec test -S /var/run/docker.sock 2>/dev/null; then
              echo "docker ready after ${i}s"
              break
            fi
            [ "$i" -eq 30 ] && { echo "docker not ready"; exit 1; }
            sleep 1
          done

          echo "=== vestad health check inside WSL ==="
          MSYS_NO_PATHCONV=1 wsl.exe -d vesta-wsl --exec $VESTAD --version

          echo "=== container image tests (skipped: WSL2 has no internet on CI runners) ==="
          echo "These tests are covered by test-linux which runs the same checks"

          echo "=== all tests passed ==="

      - name: Package Windows CLI zip
        shell: bash
        run: |
          mkdir vesta-windows
          cp target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli-exe
          path: target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Tauri app (unix) ────────────────────────────────────────────
  build-tauri:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bundles: deb,rpm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bundles: deb,rpm
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: dmg
            vfkit: true
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: dmg
            vfkit: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Download vfkit (macOS)
        if: matrix.vfkit
        run: |
          mkdir -p app/src-tauri/resources
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o app/src-tauri/resources/vfkit \
            "https://github.com/crc-org/vfkit/releases/download/v${VFKIT_VERSION}/vfkit"
          chmod +x app/src-tauri/resources/vfkit
          codesign --force --sign - app/src-tauri/resources/vfkit

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Verify macOS app bundle
        if: runner.os == 'macOS'
        run: |
          DMG=$(find app/src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' | head -1)
          echo "DMG: $DMG"
          MOUNT=$(hdiutil attach "$DMG" -nobrowse | tail -1 | awk '{print $NF}')
          echo "Mounted at: $MOUNT"
          APP=$(find "$MOUNT" -name '*.app' -maxdepth 1 | head -1)
          echo "App: $APP"
          echo "=== MacOS dir ==="
          ls -la "$APP/Contents/MacOS/"
          echo "=== Resources dir ==="
          ls -laR "$APP/Contents/Resources/"
          VFKIT=$(find "$APP" -name vfkit -type f | head -1)
          test -n "$VFKIT" || { echo "FAIL: vfkit not found anywhere in bundle"; exit 1; }
          echo "vfkit found at: $VFKIT"
          hdiutil detach "$MOUNT" -quiet
          echo "app bundle OK"

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find app/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          # Disambiguate macOS updater artifacts by architecture (both builds produce Vesta.app.tar.gz)
          ARCH_PREFIX=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          for f in tauri-out/Vesta.app.tar.gz*; do
            [ -f "$f" ] && mv "$f" "${f/Vesta.app/Vesta_${ARCH_PREFIX}.app}"
          done
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Windows, non-PR) ────────────────────────────────
  build-tauri-windows:
    needs: [build-test-windows]
    if: ${{ !failure() && !cancelled() && github.event_name != 'pull_request' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          key: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache NSIS
        id: cache-nsis
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\tauri\NSIS
          key: nsis-${{ env.NSIS_VERSION }}

      - name: Pre-install NSIS
        if: steps.cache-nsis.outputs.cache-hit != 'true'
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/nsis.zip \
            "https://github.com/tauri-apps/binary-releases/releases/download/nsis-${NSIS_VERSION}/nsis-${NSIS_VERSION}.zip"
          unzip -qo /tmp/nsis.zip -d "$NSIS_DIR"
          rm /tmp/nsis.zip

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p tauri-out
          cp app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe tauri-out/
          find app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle -name '*.sig' -exec cp {} tauri-out/ \;

      - uses: actions/upload-artifact@v7
        with:
          name: tauri-x86_64-pc-windows-msvc
          path: tauri-out/*

  # ── Push Docker image (release only) ─────────────────────────────────
  push-image:
    needs: [test-linux, build-test-windows]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Upload artifacts to release and publish ──────────────────────────
  release:
    needs: [build-vesta, build-vestad, test-frontend, test-integration, test-linux, test-macos, build-vm-image, build-test-windows, build-tauri, build-tauri-windows, push-image]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.tar.zst' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*-setup.exe' -o -name '*_x64-setup.exe' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate updater manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          REPO="elyxlz/vesta"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Tauri updater platform keys: {os}-{arch}
          # macOS uses .app.tar.gz, Windows uses .nsis.zip
          # Linux uses script-based self-update (not Tauri updater)
          cat > release/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/Vesta_aarch64.app.tar.gz",
                "signature": "$(read_sig Vesta_aarch64.app.tar.gz.sig)"
              },
              "darwin-x86_64": {
                "url": "${BASE}/Vesta_x86_64.app.tar.gz",
                "signature": "$(read_sig Vesta_x86_64.app.tar.gz.sig)"
              },
              "windows-x86_64": {
                "url": "${BASE}/Vesta_${VERSION}_x64-setup.exe",
                "signature": "$(read_sig Vesta_${VERSION}_x64-setup.exe.sig)"
              }
            }
          }
          MANIFEST
          sed -i 's/^          //' release/latest.json
          echo "Generated latest.json:"
          cat release/latest.json

      - name: Generate checksums
        run: |
          cd release
          sha256sum $(ls | grep -v '\.sig$\|\.json$') > checksums.txt

      - name: Upload assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
          gh release edit "${{ github.event.release.tag_name }}" --draft=false --prerelease=false
