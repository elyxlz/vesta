name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_artifacts:
        description: Upload signed/package artifacts for the release pipeline
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel superseded runs on PRs. Master push runs must complete:
  # cancelling them makes merge-gate-ci report cancelled siblings as a
  # failure, painting a red X on every merge burst.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Harden cargo against transient crates.io registry flakes (sporadic
  # "curl failed" / partial downloads). Retry network ops well past the
  # default of 3, and disable HTTP/2 multiplexing, whose connection reuse is
  # the usual trigger for those mid-download curl errors on CI runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  # Same hardening for npm: the registry (and the GitHub-hosted tarballs some
  # deps pull) intermittently 403/502 or drop mid-download. Retry well past
  # npm's default of 2 so a single transient blip doesn't fail an install.
  # Honored by every `npm ci` / `npm install` in this workflow.
  npm_config_fetch_retries: "5"
  npm_config_fetch_retry_mintimeout: "20000"
  npm_config_fetch_retry_maxtimeout: "120000"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  # release.yml pushes a version-bump commit before creating a release. The
  # release pipeline calls this workflow against the same SHA and produces
  # the artifacts, so skip the redundant master-push validation run.
  detect-changes:
    name: Detect changes
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
      mobile: ${{ steps.filter.outputs.mobile }}
      mobile_native: ${{ steps.filter.outputs.mobile_native }}
      agent: ${{ steps.filter.outputs.agent }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
              - 'install.sh'
              - 'install.ps1'
              # vestad embeds the agent home (build.rs EMBED_DIRS/EMBED_FILES), so
              # Agent-only changes can break the CLI or vestad and must trigger
              # their checks on PRs.
              - 'agent/core/**'
              - 'agent/skills/**'
              - 'agent/MEMORY.md'
              - 'agent/.gitignore'
              - 'agent/ruff.toml'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            app:
              - 'apps/**'
              - 'design/**'
              - 'scripts/sync-design-tokens.py'
              - 'scripts/sync-dashboard.sh'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            mobile:
              - 'apps/mobile/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/mobile-build.yml'
              - 'check.sh'
            mobile_native:
              - 'apps/mobile/app.config.ts'
              - 'apps/mobile/package.json'
              - 'apps/mobile/package-lock.json'
              - 'apps/mobile/assets/**'
              - 'apps/mobile/modules/**'
              - 'apps/mobile/plugins/**'
              - 'scripts/check-mobile-native.sh'
              - 'scripts/check-mobile-prebuild.sh'
              - '.github/workflows/ci.yml'
            agent:
              - 'agent/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            go:
              - 'agent/skills/whatsapp/cli/**'
              - 'agent/skills/telegram/cli/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'

  # ── Version check ──────────────────────────────────────────────────────
  # Same skip as detect-changes; version-check has no `needs:` so the gate
  # has to be explicit here. Jobs with a plain `if:` skip automatically when
  # their needs are skipped. Jobs using `!failure() && !cancelled()` opt out
  # of that cascade, so they must also gate on
  # `needs.detect-changes.result == 'success'` explicitly.
  version-check:
    name: Repository · Verify version consistency
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          VESTAD=$(grep '^version = ' vestad/Cargo.toml | head -1 | cut -d'"' -f2)
          CLI=$(grep '^version = ' cli/Cargo.toml | head -1 | cut -d'"' -f2)
          TESTS=$(grep '^version = ' vestad/tests-integration/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_PKG=$(python3 -c "import json; print(json.load(open('apps/desktop/package.json'))['version'])")
          MOBILE_PKG=$(python3 -c "import json; print(json.load(open('apps/mobile/package.json'))['version'])")
          MOBILE_APP=$(sed -n 's/^  version: "\([^"]*\)",/\1/p' apps/mobile/app.config.ts)
          APP=$(python3 -c "import json; print(json.load(open('apps/web/package.json'))['version'])")

          echo "agent:         $AGENT"
          echo "vestad:        $VESTAD"
          echo "cli:           $CLI"
          echo "tests:         $TESTS"
          echo "desktop pkg:   $DESKTOP_PKG"
          echo "mobile pkg:    $MOBILE_PKG"
          echo "mobile app:    $MOBILE_APP"
          echo "app:           $APP"

          FAIL=0
          for name_val in "vestad:$VESTAD" "cli:$CLI" "tests:$TESTS" "desktop-pkg:$DESKTOP_PKG" "mobile-pkg:$MOBILE_PKG" "mobile-app:$MOBILE_APP" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/core/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Fast repo-hygiene guards (skills index, uv.lock, dashboard sync, vite base) ──
  guards:
    name: Repository · Lint and guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run guard checks
        run: ./check.sh guards

  # ── GitHub Actions syntax and expression validation ─────────────────
  workflow-lint:
    name: Workflows · Validate GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  # ── Reject newly introduced vulnerable dependencies on PRs ──────────
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      # Dependency review is only available after a repository administrator
      # enables GitHub's dependency graph. Probe the API so a repository that
      # has not enabled it gets an actionable warning instead of a permanently
      # broken merge gate; once enabled, vulnerable additions fail normally.
      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          response="$RUNNER_TEMP/dependency-review.json"
          status=$(curl --silent --show-error \
            --output "$response" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}")
          case "$status" in
            200)
              echo "available=true" >> "$GITHUB_OUTPUT"
              ;;
            403|404)
              echo "available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Dependency graph is disabled; enable it in Settings > Advanced Security to activate dependency review"
              echo "Dependency review is waiting for a repository administrator to enable the dependency graph." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              cat "$response"
              echo "::error::Dependency graph probe returned HTTP $status"
              exit 1
              ;;
          esac

      - name: Review dependency changes
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@v4

  # ── Agent checks (lint, types, unit + transport tests) ────────────────
  agent-tests:
    name: Agent · Typecheck and test
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # The cc_sdk e2e transport tests (tests/test_e2e_transport.py) drive a fake
      # claude TUI inside a real tmux server.
      - name: Install tmux
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          shell: bash
          command: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Run agent checks
        run: ./check.sh agent

  # ── Go checks (whatsapp + telegram CLIs) ──────────────────────────────
  go-checks:
    name: WhatsApp & Telegram · Lint, build, and test
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            agent/skills/whatsapp/cli/go.sum
            agent/skills/telegram/cli/go.sum

      - name: Cache whisper.cpp static build
        uses: actions/cache@v6
        with:
          path: ~/.cache/vesta-whisper
          key: whisper-${{ hashFiles('agent/skills/whatsapp/cli/go.mod', 'agent/skills/whatsapp/cli/build-whisper.sh') }}

      - name: Run whatsapp checks
        run: ./check.sh whatsapp

      - name: Run telegram checks
        run: ./check.sh telegram

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    name: Apps · Lint, typecheck, and test
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: |
          npm --prefix apps ci
          npm --prefix apps/mobile ci

      - name: Run web checks
        run: ./check.sh web

  # ── EAS workflow schema validation (mobile PRs only) ─────────────────
  # This is local schema validation only. It neither authenticates to Expo nor
  # queues a cloud build, so PRs cannot consume EAS quota or access EXPO_TOKEN.
  validate-mobile-eas:
    name: Mobile · Validate EAS workflows
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Validate EAS workflows
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          workflows=(.eas/workflows/*.yml .eas/workflows/*.yaml)
          if [ "${#workflows[@]}" -eq 0 ]; then
            echo "No EAS workflows found"
            exit 1
          fi
          schema="$RUNNER_TEMP/eas-workflow-schema.json"
          curl --fail --silent --show-error https://api.expo.dev/v2/workflows/schema |
            jq --exit-status '.data' > "$schema"
          uvx check-jsonschema==0.36.2 --schemafile "$schema" "${workflows[@]}"

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    name: vestad · Run end-to-end integration tests
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # The integration suite exports multi-GB agent containers, streams them into
      # restic, and re-imports them, up to 8 tests in parallel (--test-threads=8). On a
      # stock ubuntu runner (~14 GB free on /) that exhausts the disk: docker
      # export/import, restic, and the mounted-repo git fetch fail with "no space left
      # on device", and the backup/rename tests stall until the step times out.
      # Reclaim the tens of GB of preinstalled toolchains this job never uses, and prune
      # the runner's seeded Docker images. This runs before the agent image is built, so
      # nothing the tests need is removed. Best-effort: cleanup never fails the job.
      - name: Free runner disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          docker system prune --all --force || true
          echo "Disk after cleanup:"
          df -h /

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true

      # Hermetic: the agent image is built from THIS checkout (GHA layer cache keeps it
      # fast), so integration tests exercise the PR's agent code and Dockerfile — never
      # the previously released ghcr.io :latest image.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      # These exercise a real Docker daemon, which occasionally hiccups on
      # transient container/image operations. Retry once so a single flaky op
      # doesn't fail the whole job (the build above is already cached).
      - name: Run integration tests (excludes live tests)
        id: integration
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 18
          max_attempts: 2
          retry_wait_seconds: 15
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local ./check.sh integration

      # Flakiness must be visible, not silently absorbed by the retry: surface every
      # multi-attempt run as a warning annotation + job summary so a masked race or
      # Docker flake still gets noticed.
      - name: Report flaky test retries
        if: always() && steps.integration.outputs.total_attempts > 1
        run: |
          echo "::warning title=Flaky integration tests::Integration suite needed ${{ steps.integration.outputs.total_attempts }} attempts to pass"
          {
            echo "## ⚠️ Integration test flakiness"
            echo ""
            echo "The integration suite needed **${{ steps.integration.outputs.total_attempts }} attempts** to pass."
            echo "Check the failed attempt's logs above — the retry masked a real race or Docker flake."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Check the vesta CLI on every platform it ships on ────────────────
  check-cli:
    name: CLI · Lint and test (${{ matrix.label }})
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - label: macOS ARM64
            target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      - name: Check cli (clippy + tests)
        run: TARGET=${{ matrix.target }} ./check.sh cli

  # ── Check vestad (clippy, unit tests, and Docker tests) ───────────────
  check-vestad:
    name: vestad · Lint, unit, and Docker tests (Linux x64)
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: vestad
          key: x86_64-unknown-linux-gnu

      - name: Check vestad (clippy + unit tests)
        run: TARGET=x86_64-unknown-linux-gnu ./check.sh vestad

      # Hermetic: the #[ignore] Docker tests run against an image built from this
      # checkout, not the released ghcr.io :latest.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker integration tests (vestad, Linux only)
        run: VESTAD_AGENT_IMAGE=vesta:local ./check.sh vestad-docker

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    name: vestad · Build (${{ matrix.label }})
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.app == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries; build natively per arch
          - label: Linux x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - label: Linux ARM64
            target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: vestad-aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: vestad
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build vestad
        working-directory: vestad
        # No CLOUDFLARE_* here: vestad no longer bakes a Cloudflare token into the
        # binary. Self-hosters bring their own (`vestad tunnel login`); managed VMs
        # get a control-plane-seeded tunnel.json. Nothing fleet-wide ships in the
        # public binary.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp vestad/target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Windows CLI checks and release packaging ─────────────────────────
  # PRs run the same lint/tests as Linux and macOS. The reusable release call
  # additionally builds and uploads the optimized Windows package in this same
  # job, avoiding a second Windows checkout/toolchain setup.
  check-windows:
    name: CLI · Lint and test (Windows x64)
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Check cli (clippy + tests)
        shell: bash
        run: TARGET=x86_64-pc-windows-msvc ./check.sh cli

      - name: Verify install.ps1 with PowerShell 5.1
        shell: powershell
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "❌ $_" }
            exit 1
          }

          $content = Get-Content install.ps1 -Raw
          if ($content -match 'Join-Path\s+\S+\s+"[^"]+"\s+"[^"]+"') {
            Write-Host "❌ Join-Path with 3+ arguments requires PowerShell 6+"
            exit 1
          }
          Write-Host "✅ install.ps1 is compatible with PowerShell 5.1"

      - name: Build release CLI
        if: inputs.release_artifacts
        working-directory: cli
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke test release CLI
        if: inputs.release_artifacts
        shell: bash
        run: |
          CLI="cli/target/x86_64-pc-windows-msvc/release/vesta.exe"
          "$CLI" --version
          "$CLI" --help

      - name: Package Windows CLI zip
        if: inputs.release_artifacts
        shell: bash
        run: |
          mkdir vesta-windows
          cp cli/target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: windows-cli-exe
          path: cli/target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Electron app (macOS, universal) ────────────────────────────
  build-electron-macos:
    name: Desktop · Build (macOS universal)
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: macos-latest
    # Release builds sign and notarize; Apple's notarytool can wait well past an
    # hour during notary-service backlogs, so give it the headroom the mobile
    # delivery job already has. PR builds are unsigned and finish in minutes.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      # PRs package without credentials below. Non-PR builds key the signed path
      # on the cert being present: with a cert, sign + notarize; without one,
      # force an unsigned build instead of letting electron-builder resolve an
      # empty CSC_LINK as a project-relative file.
      - name: Type-check Electron app
        working-directory: apps/desktop
        run: npx tsc

      # PR source is untrusted build input. Keep every signing and notarization
      # credential out of this step instead of relying on electron-builder's CI
      # auto-detection to skip signing after secrets have already been injected.
      - name: Build unsigned Electron app for PR
        if: github.event_name == 'pull_request'
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg zip --universal --publish never -c.mac.notarize=false

      - name: Build signed and notarized Electron app
        if: github.event_name != 'pull_request'
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            npx electron-builder --mac dmg zip --universal --publish never
          else
            echo "No signing certificate configured; building unsigned."
            # The empty secrets above still define the env vars: electron-builder resolves an
            # empty CSC_LINK against the project dir and dies with "not a file". Unset
            # them so the fallback path is genuinely unsigned.
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            CSC_IDENTITY_AUTO_DISCOVERY=false \
              npx electron-builder --mac dmg zip --universal --publish never -c.mac.notarize=false
          fi

      - name: Collect artifacts
        if: inputs.release_artifacts
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.dmg apps/desktop/dist/*.zip apps/desktop/dist/*.blockmap apps/desktop/dist/latest-mac.yml electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: electron-darwin-universal
          path: electron-out/*

  # ── Build Electron app (Linux) ────────────────────────────────────────
  build-electron-linux:
    name: Desktop · Build (${{ matrix.label }})
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-latest
            arch: x64
          - label: Linux ARM64
            os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      - name: Build Electron app
        working-directory: apps/desktop
        run: |
          npx tsc
          npx electron-builder --linux deb rpm --${{ matrix.arch }} --publish never

      - name: Collect artifacts
        if: inputs.release_artifacts
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.deb apps/desktop/dist/*.rpm electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: electron-linux-${{ matrix.arch }}
          path: electron-out/*

  # ── Build Electron app (Windows) ──────────────────────────────────────
  build-electron-windows:
    name: Desktop · Build (Windows x64)
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build web app
        working-directory: apps
        run: npm -w @vesta/web run build

      - name: Build Electron app
        working-directory: apps/desktop
        shell: bash
        run: |
          npx tsc
          npx electron-builder --win nsis --x64 --publish never

      - name: Collect artifacts
        if: inputs.release_artifacts
        shell: bash
        run: |
          mkdir -p electron-out
          cp apps/desktop/dist/*.exe apps/desktop/dist/*.blockmap apps/desktop/dist/latest.yml electron-out/
          [ "$(ls -A electron-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: inputs.release_artifacts
        with:
          name: electron-win32-x64
          path: electron-out/*

  # ── Compile generated native mobile projects without EAS quota ───────
  mobile-native:
    name: Mobile · Compile (${{ matrix.label }})
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.mobile_native == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iOS simulator
            platform: ios
            os: macos-latest
          - label: Android debug
            platform: android
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install mobile dependencies
        run: npm --prefix apps/mobile ci

      - name: Compile native project
        run: ./check.sh mobile-${{ matrix.platform }}

  # ── Merge gate (single required check for branch protection) ─────────
  merge-gate-ci:
    # Keep this check context stable: branch protection requires the job ID's
    # existing `merge-gate-ci` name.
    name: merge-gate-ci
    if: always()
    needs:
      - detect-changes
      - version-check
      - guards
      - workflow-lint
      - dependency-review
      - agent-tests
      - go-checks
      - test-frontend
      - test-integration
      - check-cli
      - check-vestad
      - build-vestad
      - check-windows
      - build-electron-macos
      - build-electron-linux
      - build-electron-windows
      - mobile-native
      - validate-mobile-eas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
