name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NSIS_VERSION: "3.11"
  # Harden cargo against transient crates.io registry flakes (sporadic
  # "curl failed" / partial downloads). Retry network ops well past the
  # default of 3, and disable HTTP/2 multiplexing, whose connection reuse is
  # the usual trigger for those mid-download curl errors on CI runners.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  # Same hardening for npm: the registry (and the GitHub-hosted tarballs some
  # deps pull) intermittently 403/502 or drop mid-download. Retry well past
  # npm's default of 2 so a single transient blip doesn't fail an install.
  # Honored by every `npm ci` / `npm install` in this workflow.
  npm_config_fetch_retries: "5"
  npm_config_fetch_retry_mintimeout: "20000"
  npm_config_fetch_retry_maxtimeout: "120000"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  # When release.yml dispatches, it (1) pushes a "Bump version to X" commit
  # to master and (2) creates a release tag. Both fire CI: a `push` event for
  # the commit and a `release` event for the tag, on different refs (so
  # different concurrency groups). The release run produces the artifacts
  # and is load-bearing; the push run is a redundant validation pass over
  # the same SHA. Skip the push run for these commits so we don't pay for
  # two parallel CIs per release.
  detect-changes:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
      agent: ${{ steps.filter.outputs.agent }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            app:
              - 'apps/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            agent:
              - 'agent/**'
              - '.github/workflows/ci.yml'
              - 'check.sh'
            go:
              - 'agent/skills/whatsapp/cli/**'

  # ── Version check ──────────────────────────────────────────────────────
  # Same skip as detect-changes; version-check has no `needs:` so the gate
  # has to be explicit here. Jobs with a plain `if:` skip automatically when
  # their needs are skipped. Jobs using `!failure() && !cancelled()` opt out
  # of that cascade, so they must also gate on
  # `needs.detect-changes.result == 'success'` explicitly.
  version-check:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          VESTAD=$(grep '^version = ' vestad/Cargo.toml | head -1 | cut -d'"' -f2)
          CLI=$(grep '^version = ' cli/Cargo.toml | head -1 | cut -d'"' -f2)
          TESTS=$(grep '^version = ' vestad/tests-integration/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_CONF=$(python3 -c "import json; print(json.load(open('apps/desktop/src-tauri/tauri.conf.json'))['version'])")
          DESKTOP_CARGO=$(grep '^version = ' apps/desktop/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          DESKTOP_PKG=$(python3 -c "import json; print(json.load(open('apps/desktop/package.json'))['version'])")
          MOBILE_CONF=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          MOBILE_CARGO=$(grep '^version = ' apps/mobile/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          MOBILE_PKG=$(python3 -c "import json; print(json.load(open('apps/mobile/package.json'))['version'])")
          APP=$(python3 -c "import json; print(json.load(open('apps/web/package.json'))['version'])")

          echo "agent:         $AGENT"
          echo "vestad:        $VESTAD"
          echo "cli:           $CLI"
          echo "tests:         $TESTS"
          echo "desktop.conf:  $DESKTOP_CONF"
          echo "desktop cargo: $DESKTOP_CARGO"
          echo "desktop pkg:   $DESKTOP_PKG"
          echo "mobile.conf:   $MOBILE_CONF"
          echo "mobile cargo:  $MOBILE_CARGO"
          echo "mobile pkg:    $MOBILE_PKG"
          echo "app:           $APP"

          FAIL=0
          for name_val in "vestad:$VESTAD" "cli:$CLI" "tests:$TESTS" "desktop.conf:$DESKTOP_CONF" "desktop-cargo:$DESKTOP_CARGO" "desktop-pkg:$DESKTOP_PKG" "mobile.conf:$MOBILE_CONF" "mobile-cargo:$MOBILE_CARGO" "mobile-pkg:$MOBILE_PKG" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Skills index auto-update ──────────────────────────────────────────
  skills-index-check:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check skills index is up to date
        run: |
          uv run python agent/skills/generate-index.py
          git diff --exit-code agent/skills/index.json || (echo "skills/index.json is stale — run 'uv run python agent/skills/generate-index.py' and commit the result" && exit 1)

  # ── Agent checks (lint, types, unit + transport tests) ────────────────
  agent-tests:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # The cc_sdk e2e transport tests (tests/test_e2e_transport.py) drive a fake
      # claude TUI inside a real tmux server.
      - name: Install tmux
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          shell: bash
          command: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Run agent checks
        run: ./check.sh agent

  # ── uv.lock freshness ─────────────────────────────────────────────────
  lockfile:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Check lockfile is up to date
        working-directory: agent
        run: |
          cp uv.lock uv.lock.before
          uv lock

          if ! diff -q uv.lock.before uv.lock > /dev/null; then
            echo "❌ uv.lock is out of date"
            echo "Please run 'cd agent && uv lock' locally and commit the changes"
            exit 1
          fi

          echo "✓ uv.lock is up to date"

  # ── Go checks (whatsapp CLI) ──────────────────────────────────────────
  go-checks:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Format check
        working-directory: agent/skills/whatsapp/cli
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ These files are not formatted:"
            echo "$UNFORMATTED"
            echo "Run 'gofmt -w .' and commit the result"
            exit 1
          fi
          echo "✓ All Go files are formatted"

      # go vet is skipped — requires whisper.cpp CGO headers that are only
      # available in the Docker build environment. Compilation is verified
      # by the container image build in CI.

  # ── Web deployment guards ─────────────────────────────────────────────
  vite-base-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Ensure vite base is "/" (required for Cloudflare Pages)
        run: |
          if grep -q 'base:\s*"\.\/"' apps/web/vite.config.ts; then
            echo '❌ apps/web/vite.config.ts has base: "./" — must be "/" for Cloudflare deployments'
            exit 1
          fi
          echo '✅ vite base path is correct'

  install-script-check:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Syntax-check install.ps1 (PowerShell 5.1)
        shell: powershell
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "❌ $_" }
            exit 1
          }
          Write-Host "✅ install.ps1 has no syntax errors"

      - name: Check for PowerShell 5.1 incompatibilities
        shell: powershell
        run: |
          $content = Get-Content install.ps1 -Raw
          $issues = @()
          # Join-Path with 3+ args requires PowerShell 6+
          if ($content -match 'Join-Path\s+\S+\s+"[^"]+"\s+"[^"]+"') {
            $issues += "Join-Path with 3+ arguments is not supported in PowerShell 5.1"
          }
          if ($issues.Count -gt 0) {
            $issues | ForEach-Object { Write-Host "❌ $_" }
            exit 1
          }
          Write-Host "✅ No PowerShell 5.1 compatibility issues found"

  dashboard-sync-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Check dashboard shared files are in sync
        run: |
          bash scripts/sync-dashboard.sh
          if ! git diff --quiet agent/skills/dashboard/app/; then
            echo "❌ Dashboard shared files are out of sync with apps/web/"
            echo "Run 'bash scripts/sync-dashboard.sh' and commit the changes"
            git diff --stat agent/skills/dashboard/app/
            exit 1
          fi
          echo "✅ Dashboard shared files are in sync"

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        working-directory: apps
        run: npm ci

      - name: Run web checks
        run: ./check.sh web

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true

      # Hermetic: the agent image is built from THIS checkout (GHA layer cache keeps it
      # fast), so integration tests exercise the PR's agent code and Dockerfile — never
      # the previously released ghcr.io :latest image.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      # These exercise a real Docker daemon, which occasionally hiccups on
      # transient container/image operations. Retry once so a single flaky op
      # doesn't fail the whole job (the build above is already cached).
      - name: Run integration tests (excludes live tests)
        id: integration
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 18
          max_attempts: 2
          retry_wait_seconds: 15
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local ./check.sh integration

      # Flakiness must be visible, not silently absorbed by the retry: surface every
      # multi-attempt run as a warning annotation + job summary so a masked race or
      # Docker flake still gets noticed.
      - name: Report flaky test retries
        if: always() && steps.integration.outputs.total_attempts > 1
        run: |
          echo "::warning title=Flaky integration tests::Integration suite needed ${{ steps.integration.outputs.total_attempts }} attempts to pass"
          {
            echo "## ⚠️ Integration test flakiness"
            echo ""
            echo "The integration suite needed **${{ steps.integration.outputs.total_attempts }} attempts** to pass."
            echo "Check the failed attempt's logs above — the retry masked a real race or Docker flake."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Live agent e2e (real Claude) — RELEASE ONLY ──────────────────────
  # Runs a real agent container talking to real Claude via the CLAUDE_CREDENTIALS
  # secret (kept fresh by refresh-credentials.yml). These are slow and spend real
  # API tokens, so they do NOT run on PRs or master pushes — only on the release
  # event, where they gate the release (the `release` and `push-image` jobs depend
  # on this one, so a live-test failure blocks publishing artifacts and the image).
  test-live:
    needs: [version-check]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true

      # Live tests must exercise the image being released, not the PREVIOUS release's
      # :latest — build it from this checkout (shares the GHA layer cache with
      # test-integration and push-image).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The token must outlive the whole test run (so agents never need to refresh it
      # in-container — only refresh-credentials.yml may ever refresh this lineage).
      # A MISSING secret (forks have no repo secrets) skips the live tests; a PRESENT
      # but stale/malformed secret FAILS the release — it means the refresh-credentials
      # pipeline is broken and we must not ship without live coverage having run.
      - name: Write Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: |
          if [ -z "$CLAUDE_CREDENTIALS" ]; then
            echo "::warning::CLAUDE_CREDENTIALS not available (fork release?) — live e2e tests will skip"
            exit 0
          fi
          remaining=$(printf '%s' "$CLAUDE_CREDENTIALS" | python3 -c "
          import sys, json, time
          creds = json.load(sys.stdin)
          print(int(creds['claudeAiOauth']['expiresAt']/1000 - time.time()))
          " 2>/dev/null || echo "invalid")
          if [ "$remaining" = "invalid" ]; then
            echo "::error::CLAUDE_CREDENTIALS is malformed — re-seed it (see vestad/tests-integration/README.md)"
            exit 1
          fi
          if [ "$remaining" -lt 3600 ]; then
            echo "::error::CLAUDE_CREDENTIALS expires in ${remaining}s (<1h). The refresh-credentials workflow should keep it >=2h valid; it is broken or its GH_PAT lost secret access. Fix the pipeline before releasing."
            exit 1
          fi
          mkdir -p ~/.claude
          printf '%s' "$CLAUDE_CREDENTIALS" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json
          echo "credentials valid for another $((remaining / 60)) minutes"

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      - name: Run live e2e tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          shell: bash
          command: VESTAD_AGENT_IMAGE=vesta:local ./check.sh live

  # ── Check vesta (clippy + tests) ──────────────────────────────────────
  check-vesta:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            run-vestad: true
          - target: aarch64-apple-darwin
            os: macos-latest
            run-vestad: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      # cli clippy + tests run on BOTH platforms: the CLI ships to macOS users, so its
      # tests must run there too, not just be cross-compiled.
      - name: Check cli (clippy + tests)
        run: TARGET=${{ matrix.target }} ./check.sh cli

      - name: Check vestad (clippy + tests, Linux only)
        if: matrix.run-vestad
        run: TARGET=${{ matrix.target }} ./check.sh vestad

      # Hermetic: the #[ignore] Docker tests run against an image built from this
      # checkout, not the released ghcr.io :latest.
      - name: Set up Docker Buildx
        if: matrix.run-vestad
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        if: matrix.run-vestad
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker integration tests (vestad, Linux only)
        if: matrix.run-vestad
        run: VESTAD_AGENT_IMAGE=vesta:local ./check.sh vestad-docker

  # ── Build vesta client (all unix targets) ─────────────────────────────
  # Pure build job: clippy + tests live in check-vesta (and check-windows), which also
  # run on non-PR events — duplicating them here just slowed releases down.
  build-vesta:
    needs: [version-check]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-aarch64-unknown-linux-gnu
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vesta-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vesta-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: |
            cli
            vestad
          key: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p cli/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> cli/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> cli/.cargo/config.toml

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp cli/target/${{ matrix.target }}/release/vesta staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || needs.detect-changes.outputs.app == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries; build natively per arch
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: vestad-aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: vestad
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build vestad
        working-directory: vestad
        # No CLOUDFLARE_* here: vestad no longer bakes a Cloudflare token into the
        # binary. Self-hosters bring their own (`vestad tunnel login`); managed VMs
        # get a control-plane-seeded tunnel.json. Nothing fleet-wide ships in the
        # public binary.
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp vestad/target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Test Linux (vestad HTTP API) ──────────────────────────────────────
  test-linux:
    needs: [build-vestad, build-vesta]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{vestad-x86_64-unknown-linux-gnu,vesta-x86_64-unknown-linux-gnu}"
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for f in *.tar.gz; do tar -xzf "$f"; done
          chmod +x vestad vesta
          ./vestad --version
          ./vesta --version

  # ── Windows checks (clippy + tests, runs on PRs too) ─────────────────
  # The CLI ships to Windows users; its tests must actually run on Windows,
  # not just be lint-checked there.
  check-windows:
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Check cli (clippy + tests)
        shell: bash
        run: TARGET=x86_64-pc-windows-msvc ./check.sh cli

  # ── Build Windows CLI (native MSVC) ──────────────────────────────────
  build-windows:
    needs: [version-check, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      needs.detect-changes.outputs.cli == 'true' ||
      github.event_name != 'pull_request'
      )
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc

      - name: Build vesta
        working-directory: cli
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke test
        shell: bash
        run: |
          CLI="cli/target/x86_64-pc-windows-msvc/release/vesta.exe"
          "$CLI" --version
          "$CLI" --help

      - name: Package Windows CLI zip
        shell: bash
        run: |
          mkdir vesta-windows
          cp cli/target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli-exe
          path: cli/target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Tauri app (macOS) ───────────────────────────────────────────
  build-tauri-macos:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: dmg
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      # Retry: bundle_dmg.sh occasionally fails on macos-latest runners when the
      # window server is unresponsive to the AppleScript-driven Finder layout step.
      - name: Build Tauri app
        uses: nick-fields/retry@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd apps/desktop && npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          ARCH_PREFIX=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          for f in tauri-out/Vesta.app.tar.gz*; do
            [ -f "$f" ] && mv "$f" "${f/Vesta.app/Vesta_${ARCH_PREFIX}.app}"
          done
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Linux — needs vestad bundled) ──────────────────
  build-tauri-linux:
    needs: [test-frontend, detect-changes, build-vestad]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bundles: deb,rpm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bundles: deb,rpm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Bundle vestad
        uses: actions/download-artifact@v8
        with:
          name: vestad-${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
          path: /tmp/vestad-artifact

      - name: Install vestad into resources
        run: |
          tar -xzf /tmp/vestad-artifact/vestad-*.tar.gz -C /tmp/vestad-artifact/
          mkdir -p apps/desktop/src-tauri/resources
          cp /tmp/vestad-artifact/vestad apps/desktop/src-tauri/resources/vestad
          chmod +x apps/desktop/src-tauri/resources/vestad

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build Tauri app
        uses: nick-fields/retry@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd apps/desktop && npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Windows) ─────────────────────────────────────────
  build-tauri-windows:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: windows-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: apps/desktop/src-tauri
          key: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache NSIS
        id: cache-nsis
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\tauri\NSIS
          key: nsis-${{ env.NSIS_VERSION }}

      - name: Pre-install NSIS
        if: steps.cache-nsis.outputs.cache-hit != 'true'
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/nsis.zip \
            "https://github.com/tauri-apps/binary-releases/releases/download/nsis-${NSIS_VERSION}/nsis-${NSIS_VERSION}.zip"
          unzip -qo /tmp/nsis.zip -d "$NSIS_DIR"
          rm /tmp/nsis.zip

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Build Tauri app
        uses: nick-fields/retry@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          shell: bash
          command: cd apps/desktop && npx tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p tauri-out
          cp apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe tauri-out/
          # The updater artifact (.nsis.zip) is what the updater plugin downloads;
          # without it, the release manifest signature is empty and Windows fails
          # with "update failed". createUpdaterArtifacts in tauri.conf.json enables it.
          find apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle \
            -type f \( -name '*.nsis.zip' -o -name '*.sig' \) -exec cp {} tauri-out/ \;

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-x86_64-pc-windows-msvc
          path: tauri-out/*

  # ── Build Tauri app (Android APK) ────────────────────────────────────
  build-tauri-android:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: ./.github/actions/install-rust
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        with:
          workspaces: apps/mobile/src-tauri
          key: android

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # sdkmanager streams the NDK zip with no internal retry, so a single
      # corrupted download ("Error reading Zip content from a SeekableByteChannel")
      # fails the whole job. Retry the download instead of one-shotting it.
      - name: Install Android NDK
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: apps
        run: npm install

      - name: Initialize Android project
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: cd apps/mobile && npx tauri android init

      # Tauri's AndroidManifest template only declares INTERNET. Add the
      # microphone permissions the web app's getUserMedia call needs.
      - name: Add runtime permissions to AndroidManifest
        run: python3 scripts/android-add-permissions.py apps/mobile/src-tauri/gen/android/app/src/main/AndroidManifest.xml

      # Set up release signing if the ANDROID_KEYSTORE_BASE64 secret is configured.
      # If the secret is missing, the next step falls back to a debug-signed APK
      # so CI doesn't break (debug APKs install on-device but can't be used for
      # real Play Store updates because Android tracks signing certs per app).
      - name: Set up release signing
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building debug-signed APK (not suitable for Play Store updates)"
            exit 0
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > apps/mobile/src-tauri/gen/android/keystore.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          EOF
          python3 scripts/android-sign-patch.py apps/mobile/src-tauri/gen/android/app/build.gradle.kts
          echo "signed=true" >> "$GITHUB_OUTPUT"

      # Retry: Gradle bootstraps from GitHub on first run, and resolves Kotlin/
      # Android deps from Maven Central + plugins.gradle.org, which intermittently
      # 403/502. retry_wait_seconds backs off so a transient block clears between
      # attempts instead of all 3 retries hitting it back-to-back.
      - name: Build Android APK
        uses: nick-fields/retry@v4
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            cd apps/mobile
            if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
              npx tauri android build --apk
            else
              npx tauri android build --apk --debug
            fi

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find apps/mobile/src-tauri/gen/android -name '*.apk' -exec cp {} tauri-out/ \;
          VERSION=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          SUFFIX=""
          if [ "${{ steps.signing.outputs.signed }}" != "true" ]; then
            SUFFIX="-debug"
          fi
          for f in tauri-out/*.apk; do
            mv "$f" "tauri-out/Vesta_${VERSION}${SUFFIX}.apk"
          done
          ls -lh tauri-out/

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-android
          path: tauri-out/*

  # ── Build Tauri app (iOS) ────────────────────────────────────────────
  build-tauri-ios:
    needs: [test-frontend, detect-changes]
    if: >-
      !failure() && !cancelled() &&
      needs.detect-changes.result == 'success' && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.app == 'true'
      )
    runs-on: macos-latest
    timeout-minutes: 150
    steps:
      - name: Check for Apple signing secrets
        env:
          HAS_SECRETS: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          if [ "$HAS_SECRETS" != "true" ]; then
            echo "::warning::Apple signing secrets not configured — skipping iOS build"
            echo "SKIP_IOS=true" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v7
        if: env.SKIP_IOS != 'true'

      - name: Install Rust
        if: env.SKIP_IOS != 'true'
        uses: ./.github/actions/install-rust
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        # Caching is best-effort: a transient cache-service outage must not fail the
        # build (it just rebuilds uncached) the way it did during the v0.1.158 release.
        continue-on-error: true
        if: env.SKIP_IOS != 'true'
        with:
          workspaces: apps/mobile/src-tauri
          key: ios

      - name: Setup Node
        if: env.SKIP_IOS != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Apple certificate and provisioning profile
        if: env.SKIP_IOS != 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install frontend deps
        if: env.SKIP_IOS != 'true'
        working-directory: apps
        run: npm install

      - name: Initialize iOS project
        if: env.SKIP_IOS != 'true'
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: cd apps/mobile && npx tauri ios init

      - name: Build iOS
        if: env.SKIP_IOS != 'true'
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 45
          max_attempts: 3
          shell: bash
          command: cd apps/mobile && npx tauri ios build --export-method app-store-connect

      - name: Collect artifacts
        if: env.SKIP_IOS != 'true'
        run: |
          mkdir -p tauri-out
          find apps/mobile/src-tauri/gen/apple -name '*.ipa' -exec cp {} tauri-out/ \;
          VERSION=$(python3 -c "import json; print(json.load(open('apps/mobile/src-tauri/tauri.conf.json'))['version'])")
          for f in tauri-out/*.ipa; do
            mv "$f" "tauri-out/Vesta_${VERSION}.ipa"
          done
          ls -lh tauri-out/

      - name: Upload to TestFlight
        if: env.SKIP_IOS != 'true' && github.event_name == 'release'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file tauri-out/Vesta_*.ipa \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - uses: actions/upload-artifact@v7
        if: env.SKIP_IOS != 'true'
        with:
          name: tauri-ios
          path: tauri-out/*

      - name: Clean up keychain
        if: env.SKIP_IOS != 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  # ── Merge gate (single required check for branch protection) ─────────
  merge-gate-ci:
    if: always()
    needs:
      - version-check
      - skills-index-check
      - agent-tests
      - lockfile
      - go-checks
      - vite-base-check
      - install-script-check
      - dashboard-sync-check
      - test-frontend
      - test-integration
      - check-vesta
      - build-vesta
      - build-vestad
      - test-linux
      - check-windows
      - build-windows
      - build-tauri-macos
      - build-tauri-linux
      - build-tauri-windows
      - build-tauri-android
      - build-tauri-ios
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  # ── Push Docker image (release only) ─────────────────────────────────
  # Gated on test-live: a live-test failure (via !failure() over needs) skips the
  # image push, so a broken agent is never published to :latest.
  push-image:
    needs: [test-linux, test-live]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Beta publish pushes only the version tag. `:latest` is moved onto this
          # digest later by promote.yml, so stable agents (which pull `:vX.Y.Z`
          # pinned to the vestad version) are unaffected until promotion.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Upload artifacts to release and publish ──────────────────────────
  release:
    needs: [build-vesta, build-vestad, test-frontend, test-integration, test-live, test-linux, build-windows, build-tauri-macos, build-tauri-linux, build-tauri-windows, build-tauri-android, build-tauri-ios, push-image]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Verify install scripts exist at tagged version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          REPO="elyxlz/vesta"
          BASE="https://raw.githubusercontent.com/${REPO}/${VERSION}"
          for script in install.sh install.ps1; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${BASE}/${script}")
            if [ "$STATUS" != "200" ]; then
              echo "::error::${script} not found at ${BASE}/${script} (HTTP ${STATUS})"
              exit 1
            fi
            echo "✓ ${script} exists at ${VERSION}"
          done

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*-setup.exe' -o -name '*_x64-setup.exe' -o \
            -name '*.nsis.zip' -o \
            -name '*.apk' -o -name '*.ipa' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate updater manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          REPO="elyxlz/vesta"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Tauri updater platform keys: {os}-{arch}
          # macOS uses .app.tar.gz, Windows uses .nsis.zip
          # Linux uses script-based self-update (not Tauri updater)
          cat > release/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/Vesta_aarch64.app.tar.gz",
                "signature": "$(read_sig Vesta_aarch64.app.tar.gz.sig)"
              },
              "darwin-x86_64": {
                "url": "${BASE}/Vesta_x86_64.app.tar.gz",
                "signature": "$(read_sig Vesta_x86_64.app.tar.gz.sig)"
              },
              "windows-x86_64": {
                "url": "${BASE}/Vesta_${VERSION}_x64-setup.nsis.zip",
                "signature": "$(read_sig Vesta_${VERSION}_x64-setup.nsis.zip.sig)"
              }
            }
          }
          MANIFEST
          sed -i 's/^          //' release/latest.json
          echo "Generated latest.json:"
          cat release/latest.json

      - name: Generate checksums
        run: |
          cd release
          sha256sum $(ls | grep -v '\.sig$\|\.json$') > checksums.txt

      # Beta publish: upload assets to the release but leave it a prerelease. Only
      # opted-in beta clients follow prereleases; stable stays put until promote.yml
      # flips this release to latest. This is the canary window.
      - name: Upload assets to prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
          echo "Uploaded assets to prerelease ${{ github.event.release.tag_name }}."
          echo "Run ./promote.sh ${{ github.event.release.tag_name }} to release it to stable."

  # ── Revert a failed release ───────────────────────────────────────────
  # release.sh creates the GitHub release BEFORE CI runs, so a failure (e.g.
  # test-live) leaves a published-but-asset-less release. Updaters that follow
  # prereleases then pick it up and 404 on the missing binary. Delete the
  # release and its tag, AND revert the "Bump version to X" commit release.yml
  # pushed to master — otherwise the version is stranded (master sits at the
  # bumped version with no release, and the next ./release.sh skips to the next
  # patch). Reverting it lets a re-run retry the same version.
  revert-failed-release:
    needs: [build-vesta, build-vestad, test-frontend, test-integration, test-live, test-linux, build-windows, build-tauri-macos, build-tauri-linux, build-tauri-windows, build-tauri-android, build-tauri-ios, push-image, release]
    if: ${{ failure() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Delete the failed release and revert the bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "::warning::release CI failed for ${TAG} — deleting the release and its tag so updaters cannot pick up an asset-less release. Re-run ./release.sh after fixing to retry ${TAG}."
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          # Undo the bump with a revert commit, not a force-push: branch protection
          # forbids force-pushes to master (allow_force_pushes: false). Only revert
          # when the bump is still the tip, so a commit that landed after it is safe.
          git fetch origin master
          if git log origin/master -1 --pretty=%s | grep -q "^Bump version to "; then
            git reset --hard origin/master
            git revert --no-edit HEAD
            git push origin master
          else
            echo "::warning::master tip is not a 'Bump version to' commit — leaving it for manual cleanup."
          fi
