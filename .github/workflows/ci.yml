name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NSIS_VERSION: "3.11"

jobs:
  # ── Detect what changed (for smart PR filtering) ────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - 'vestad/**'
              - 'vesta-common/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            app:
              - 'app/**'

  # ── Version check ──────────────────────────────────────────────────────
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version sync across sources
        run: |
          AGENT=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          CLI=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          TAURI_CONF=$(python3 -c "import json; print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")
          TAURI_CARGO=$(grep '^version = ' app/src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          APP=$(python3 -c "import json; print(json.load(open('app/package.json'))['version'])")

          echo "agent:       $AGENT"
          echo "cli:         $CLI"
          echo "tauri.conf:  $TAURI_CONF"
          echo "tauri cargo: $TAURI_CARGO"
          echo "app:         $APP"

          FAIL=0
          for name_val in "cli:$CLI" "tauri.conf:$TAURI_CONF" "tauri-cargo:$TAURI_CARGO" "app:$APP"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$AGENT" != "$val" ]; then
              echo "❌ agent ($AGENT) != $name ($val)"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "All version sources must match"
            exit 1
          fi
          echo "✓ All versions match: $AGENT"

      - name: Check tag matches version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' agent/pyproject.toml | cut -d'"' -f2)
          echo "Tag: v$TAG"
          echo "Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
          echo "✓ Tag matches version"

  # ── Skills index auto-update ──────────────────────────────────────────
  skills-index-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check skills index is up to date
        run: |
          uv run python agent/skills/generate-index.py
          git diff --exit-code agent/skills/index.json || (echo "skills/index.json is stale — run 'uv run python agent/skills/generate-index.py' and commit the result" && exit 1)

  # ── Frontend unit tests ──────────────────────────────────────────────
  test-frontend:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Type check
        working-directory: app
        run: npm run check

      - name: Run tests
        working-directory: app
        run: npm run test

  # ── Integration tests (real vestad + real client, Docker required) ─────
  test-integration:
    needs: [version-check, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent image
        run: docker pull ghcr.io/elyxlz/vesta:latest

      - name: Build vestad
        run: cargo build -p vestad

      - name: Run integration tests
        run: cargo test -p vesta-tests -- --test-threads=1

  # ── Build vesta client (all unix targets) ─────────────────────────────
  build-vesta:
    needs: [version-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vesta-aarch64-unknown-linux-gnu
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vesta-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vesta-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: ${{ matrix.target }}

      - name: Install Linux cross-compile deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Clippy
        if: "!matrix.cross"
        working-directory: .
        run: cargo clippy --workspace --exclude vesta-tests --target ${{ matrix.target }} -- -D warnings

      - name: Test
        if: "!matrix.cross"
        working-directory: .
        run: cargo test --workspace --exclude vesta-tests --target ${{ matrix.target }}

      - name: Build vesta
        working-directory: .
        run: cargo build --release -p vesta --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/vesta staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Build vestad server (Linux only) ─────────────────────────────────
  build-vestad:
    needs: [version-check, detect-changes]
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets for static binaries
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: vestad-aarch64-unknown-linux-gnu
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: vestad-${{ matrix.target }}

      - name: Install musl toolchain
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build vestad
        working-directory: .
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p vestad --target ${{ matrix.target }}
          else
            cargo build --release -p vestad --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/vestad staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── Test Linux (vestad HTTP API) ──────────────────────────────────────
  test-linux:
    needs: [build-vestad, build-vesta]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{vestad-x86_64-unknown-linux-gnu,vesta-x86_64-unknown-linux-gnu}"
          merge-multiple: true

      - name: Smoke test release binaries
        run: |
          for f in *.tar.gz; do tar -xzf "$f"; done
          chmod +x vestad vesta
          ./vestad --version
          ./vesta --version

  # ── Windows Clippy (runs on PRs too) ─────────────────────────────────
  clippy-windows:
    needs: [version-check, detect-changes]
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: x86_64-pc-windows-msvc

      - name: Clippy
        working-directory: .
        run: cargo clippy -p vesta --target x86_64-pc-windows-msvc -- -D warnings

  # ── Build Windows CLI (native MSVC) ──────────────────────────────────
  build-windows:
    needs: [clippy-windows, detect-changes]
    if: >-
      !failure() && !cancelled() && (
      needs.detect-changes.outputs.cli == 'true' ||
      github.event_name != 'pull_request'
      )
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: x86_64-pc-windows-msvc

      - name: Build vesta
        working-directory: .
        run: cargo build --release -p vesta --target x86_64-pc-windows-msvc

      - name: Smoke test
        shell: bash
        run: |
          CLI="target/x86_64-pc-windows-msvc/release/vesta.exe"
          "$CLI" --version
          "$CLI" --help

      - name: Package Windows CLI zip
        shell: bash
        run: |
          mkdir vesta-windows
          cp target/x86_64-pc-windows-msvc/release/vesta.exe vesta-windows/
          7z a vesta-x86_64-pc-windows-msvc.zip vesta-windows/

      - uses: actions/upload-artifact@v7
        with:
          name: vesta-x86_64-pc-windows-msvc
          path: vesta-x86_64-pc-windows-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cli-exe
          path: target/x86_64-pc-windows-msvc/release/vesta.exe

  # ── Build Tauri app (unix) ────────────────────────────────────────────
  build-tauri:
    needs: [test-frontend, detect-changes, build-vestad]
    if: >-
      !failure() && !cancelled() && (
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.cli == 'true' ||
      needs.detect-changes.outputs.app == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bundles: deb,rpm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bundles: deb,rpm
          - target: aarch64-apple-darwin
            os: macos-latest
            bundles: dmg
          - target: x86_64-apple-darwin
            os: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Bundle vestad (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v8
        with:
          name: vestad-${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
          path: /tmp/vestad-artifact

      - name: Install vestad into resources (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -xzf /tmp/vestad-artifact/vestad-*.tar.gz -C /tmp/vestad-artifact/
          mkdir -p app/src-tauri/resources
          cp /tmp/vestad-artifact/vestad app/src-tauri/resources/vestad
          chmod +x app/src-tauri/resources/vestad

      - name: Install frontend deps
        working-directory: app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p tauri-out
          find app/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.tar.gz' -o -name '*.sig' \) \
            -exec cp {} tauri-out/ \;
          # Disambiguate macOS updater artifacts by architecture (both builds produce Vesta.app.tar.gz)
          ARCH_PREFIX=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          for f in tauri-out/Vesta.app.tar.gz*; do
            [ -f "$f" ] && mv "$f" "${f/Vesta.app/Vesta_${ARCH_PREFIX}.app}"
          done
          [ "$(ls -A tauri-out)" ] || { echo "No artifacts collected"; exit 1; }

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: tauri-${{ matrix.target }}
          path: tauri-out/*

  # ── Build Tauri app (Windows, non-PR) ────────────────────────────────
  build-tauri-windows:
    needs: [build-windows]
    if: ${{ !failure() && !cancelled() && github.event_name != 'pull_request' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          key: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache NSIS
        id: cache-nsis
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\tauri\NSIS
          key: nsis-${{ env.NSIS_VERSION }}

      - name: Pre-install NSIS
        if: steps.cache-nsis.outputs.cache-hit != 'true'
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o /tmp/nsis.zip \
            "https://github.com/tauri-apps/binary-releases/releases/download/nsis-${NSIS_VERSION}/nsis-${NSIS_VERSION}.zip"
          unzip -qo /tmp/nsis.zip -d "$NSIS_DIR"
          rm /tmp/nsis.zip

      - name: Install frontend deps
        working-directory: app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npx tauri
          args: --target x86_64-pc-windows-msvc --bundles nsis

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p tauri-out
          cp app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe tauri-out/
          find app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle -name '*.sig' -exec cp {} tauri-out/ \;

      - uses: actions/upload-artifact@v7
        with:
          name: tauri-x86_64-pc-windows-msvc
          path: tauri-out/*

  # ── Push Docker image (release only) ─────────────────────────────────
  push-image:
    needs: [test-linux]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Upload artifacts to release and publish ──────────────────────────
  release:
    needs: [build-vesta, build-vestad, test-frontend, test-integration, test-linux, build-windows, build-tauri, build-tauri-windows, push-image]
    if: ${{ !failure() && !cancelled() && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "!*.dockerbuild"

      - name: Collect release assets
        run: |
          mkdir release
          find artifacts -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o \
            -name '*-setup.exe' -o -name '*_x64-setup.exe' -o \
            -name '*.sig' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate updater manifest
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          REPO="elyxlz/vesta"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() {
            local f="release/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          # Tauri updater platform keys: {os}-{arch}
          # macOS uses .app.tar.gz, Windows uses .nsis.zip
          # Linux uses script-based self-update (not Tauri updater)
          cat > release/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/Vesta_aarch64.app.tar.gz",
                "signature": "$(read_sig Vesta_aarch64.app.tar.gz.sig)"
              },
              "darwin-x86_64": {
                "url": "${BASE}/Vesta_x86_64.app.tar.gz",
                "signature": "$(read_sig Vesta_x86_64.app.tar.gz.sig)"
              },
              "windows-x86_64": {
                "url": "${BASE}/Vesta_${VERSION}_x64-setup.exe",
                "signature": "$(read_sig Vesta_${VERSION}_x64-setup.exe.sig)"
              }
            }
          }
          MANIFEST
          sed -i 's/^          //' release/latest.json
          echo "Generated latest.json:"
          cat release/latest.json

      - name: Generate checksums
        run: |
          cd release
          sha256sum $(ls | grep -v '\.sig$\|\.json$') > checksums.txt

      - name: Upload assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in release/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
          gh release edit "${{ github.event.release.tag_name }}" --draft=false --prerelease=false
