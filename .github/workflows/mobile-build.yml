name: Mobile build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        required: true
        default: all
        options:
          - all
          - ios
          - android
      profile:
        description: EAS build profile
        type: choice
        required: true
        default: preview
        options:
          - development
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ inputs.platform }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: Mobile · Build (${{ inputs.platform }}, ${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/package-lock.json
            apps/mobile/package-lock.json

      - name: Install dependencies
        run: |
          npm --prefix apps ci
          npm --prefix apps/mobile ci

      - name: Validate mobile app
        run: ./check.sh web

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Queue EAS build
        working-directory: apps/mobile
        run: eas build --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive --no-wait
