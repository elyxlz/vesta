name: Promote

# Promote a beta (prerelease) to stable. Every ./release.sh ships a prerelease that
# only opted-in beta clients follow; this workflow does the stable half once the beta
# has soaked: flip every older stranded prerelease to stable, move the agent image
# :latest tag, flip the GitHub release to latest, and advance the production branch.
# No rebuild happens here, the exact artifacts that beta users tested become stable.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to promote (e.g. v0.1.156)"
        type: string
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: promote
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate tag is an existing prerelease
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          case "$TAG" in
            v*) ;;
            *) echo "::error::tag must look like vX.Y.Z (got '$TAG')"; exit 1 ;;
          esac
          IS_PRERELEASE=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::$TAG is not a prerelease (already promoted, or does not exist)"
            exit 1
          fi
          echo "✓ $TAG is a prerelease, promoting to stable"

      # Stable history has no gaps: every prerelease older than the promoted tag flips
      # to stable too (ascending, --latest=false so none steals the latest pointer).
      # :latest and production only ever track the promoted tag itself.
      - name: Promote older stranded prereleases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName' | sort -V |
            while read -r OLDER_TAG; do
              NEWEST=$(printf '%s\n%s\n' "$OLDER_TAG" "$TAG" | sort -V | tail -n1)
              if [ "$OLDER_TAG" != "$TAG" ] && [ "$NEWEST" = "$TAG" ]; then
                gh release edit "$OLDER_TAG" --repo "$GITHUB_REPOSITORY" --prerelease=false --latest=false
                echo "✓ $OLDER_TAG flipped to stable"
              fi
            done

      # Full history: the production push is a force-push of the tag's commit, and a
      # shallow checkout can be rejected with "shallow update not allowed".
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-point :latest at the already-pushed :vX.Y.Z digest without rebuilding.
      # imagetools preserves the multi-arch manifest list.
      - name: Move :latest to the promoted image
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${GITHUB_REPOSITORY}:latest" \
            "ghcr.io/${GITHUB_REPOSITORY}:${TAG}"

      - name: Flip GitHub release to stable
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease=false --latest
          echo "✓ $TAG is now the latest stable release"

      # Stable desktop/CLI/vestad now see this version via releases/latest. Advance
      # production to the promoted commit (this is what stable clients track).
      - name: Advance production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:production
          echo "✓ production advanced to ${{ inputs.tag }}"

  # iOS stable = App Store. The matching build was already uploaded to TestFlight (the
  # iOS beta channel) during the beta CI run; here we submit it for App Store review.
  # Self-skips until the Apple ASC API secrets exist, exactly like the iOS build job in
  # ci.yml, so this is dormant-but-wired today and lights up the day secrets are added.
  #
  # Apple review is async: TestFlight (beta) users already have this build; App Store
  # (stable) iOS users get it only once Apple approves, so iOS stable lags the rest of
  # the promotion by review time. Runs on Linux because submission is pure ASC API (no
  # build), separate from `promote` so an iOS hiccup never undoes the core promotion.
  submit-ios:
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check Apple ASC API secrets
        env:
          HAS_SECRETS: ${{ secrets.APPLE_API_KEY != '' }}
        run: |
          if [ "$HAS_SECRETS" != "true" ]; then
            echo "::warning::Apple ASC API secrets not configured — skipping App Store submission (iOS stays beta-only on TestFlight)"
            echo "SKIP_IOS_SUBMIT=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v7
        if: env.SKIP_IOS_SUBMIT != 'true'
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Ruby
        if: env.SKIP_IOS_SUBMIT != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install fastlane
        if: env.SKIP_IOS_SUBMIT != 'true'
        run: gem install fastlane -N

      # Submits the already-processed TestFlight build for the promoted version. The
      # first ever App Store release must be set up manually (listing/metadata exist
      # before skip_metadata works); subsequent promotions go through this lane.
      - name: Submit iOS build for App Store review
        if: env.SKIP_IOS_SUBMIT != 'true'
        working-directory: apps/mobile
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          TAG: ${{ inputs.tag }}
        run: |
          fastlane promote version:"${TAG#v}"
