name: Promote

# Promote a beta (prerelease) to stable. Every ./release.sh ships a prerelease that
# only opted-in beta clients follow; this workflow does the stable half once the beta
# has soaked: move the agent image :latest tag, flip the GitHub release to latest, and
# advance the production branch. No rebuild happens here, the exact artifacts that beta
# users tested become stable.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to promote (e.g. v0.1.156)"
        type: string
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: promote
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate tag is an existing prerelease
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          case "$TAG" in
            v*) ;;
            *) echo "::error::tag must look like vX.Y.Z (got '$TAG')"; exit 1 ;;
          esac
          IS_PRERELEASE=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::$TAG is not a prerelease (already promoted, or does not exist)"
            exit 1
          fi
          echo "✓ $TAG is a prerelease, promoting to stable"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-point :latest at the already-pushed :vX.Y.Z digest without rebuilding.
      # imagetools preserves the multi-arch manifest list.
      - name: Move :latest to the promoted image
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${GITHUB_REPOSITORY}:latest" \
            "ghcr.io/${GITHUB_REPOSITORY}:${TAG}"

      # NOTE: iOS App Store submission goes here once an Apple Developer account and the
      # APPLE_* secrets exist (the beta TestFlight upload in ci.yml already self-skips
      # without them). On promotion, submit the already-uploaded TestFlight build for App
      # Store review via the App Store Connect API. Until then, iOS ships beta-only via
      # TestFlight and there is no public App Store release to promote.

      - name: Flip GitHub release to stable
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease=false --latest
          echo "✓ $TAG is now the latest stable release"

      # Stable desktop/CLI/vestad now see this version via releases/latest. Advance
      # production to the promoted commit (this is what stable clients track).
      - name: Advance production branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:production
          echo "✓ production advanced to ${{ inputs.tag }}"
