name: tmp-cf-export
on: push
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: encrypt secrets to public key
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          PUB=.github/workflows/cf-export-pub.pem
          enc () { printf '%s' "$1" | openssl pkeyutl -encrypt -pubin -inkey "$PUB" -pkeyopt rsa_padding_mode:oaep | base64 -w0; }
          echo "BEGIN_CF_TOKEN::$(enc "$CF_TOKEN")::END_CF_TOKEN"
          echo "BEGIN_CF_ACCOUNT::$(enc "$CF_ACCOUNT")::END_CF_ACCOUNT"
          echo "BEGIN_CF_ZONE::$(enc "$CF_ZONE")::END_CF_ZONE"
