name: PR Checks

on:
  push:
    branches: [ master ]
    paths: [ 'agent/**' ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            agent:
              - 'agent/**'

  lockfile:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Check lockfile is up to date
        working-directory: agent
        run: |
          cp uv.lock uv.lock.before
          uv lock

          if ! diff -q uv.lock.before uv.lock > /dev/null; then
            echo "❌ uv.lock is out of date"
            echo "Please run 'cd agent && uv lock' locally and commit the changes"
            exit 1
          fi

          echo "✓ uv.lock is up to date"

  agent-tests:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Lint
        working-directory: agent
        run: uv run ruff check

      - name: Format check
        working-directory: agent
        run: uv run ruff format --check

      - name: Install tools
        working-directory: agent
        run: |
          uv sync
          for tool in skills/*/cli/; do
            [ -f "$tool/pyproject.toml" ] && uv pip install -e "$tool"
          done

      - name: Type check
        working-directory: agent
        run: uv run ty check

      - name: Run tests
        working-directory: agent
        run: uv run pytest tests/test_unit.py
