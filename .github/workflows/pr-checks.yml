name: PR Checks

on:
  push:
    branches: [ master ]
    paths: [ 'agent/**' ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            agent:
              - 'agent/**'
            go:
              - 'agent/skills/whatsapp/cli/**'

  lockfile:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Check lockfile is up to date
        working-directory: agent
        run: |
          cp uv.lock uv.lock.before
          uv lock

          if ! diff -q uv.lock.before uv.lock > /dev/null; then
            echo "❌ uv.lock is out of date"
            echo "Please run 'cd agent && uv lock' locally and commit the changes"
            exit 1
          fi

          echo "✓ uv.lock is up to date"

  go-checks:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Format check
        working-directory: agent/skills/whatsapp/cli
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ These files are not formatted:"
            echo "$UNFORMATTED"
            echo "Run 'gofmt -w .' and commit the result"
            exit 1
          fi
          echo "✓ All Go files are formatted"

      # go vet is skipped — requires whisper.cpp CGO headers that are only
      # available in the Docker build environment. Compilation is verified
      # by the container image build in CI.

  vite-base-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure vite base is "/" (required for Cloudflare Pages)
        run: |
          if grep -q 'base:\s*"\.\/"' app/vite.config.ts; then
            echo '❌ app/vite.config.ts has base: "./" — must be "/" for Cloudflare deployments'
            exit 1
          fi
          echo '✅ vite base path is correct'

  # ── Merge gate (single required check for branch protection) ─────────
  merge-gate-pr:
    if: always()
    needs: [lockfile, agent-tests, go-checks, vite-base-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

  agent-tests:
    needs: detect-changes
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Lint
        working-directory: agent
        run: uv run ruff check

      - name: Format check
        working-directory: agent
        run: uv run ruff format --check

      - name: Install tools
        working-directory: agent
        run: |
          uv sync
          for tool in skills/*/cli/; do
            [ -f "$tool/pyproject.toml" ] && uv pip install -e "$tool"
          done

      - name: Type check
        working-directory: agent
        run: uv run ty check

      - name: Run tests
        working-directory: agent
        run: uv run pytest tests/ --ignore=tests/test_e2e.py -v

      # NOTE: tasks skill CLI tests (skills/tasks/cli/tests/) are not yet
      # CI-compatible — daemon startup requires port binding that's unreliable
      # in GitHub Actions. Run locally with: cd agent/skills/tasks/cli && uv run pytest tests/
