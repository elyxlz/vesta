name: Nightly

# Exhaustive nightly run on master. Unlike PR/push CI:
#   - the Docker integration suite runs with NO retry wrapper, so flaky tests FAIL here
#     instead of being absorbed (PR CI retries once for Docker-daemon hiccups)
#   - the vestad #[ignore] Docker unit tests run too
# A failure creates (or comments on) a GitHub issue labeled `nightly-failure`.

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli
            vestad

      - name: Install tmux
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Install frontend deps
        working-directory: apps
        run: npm ci

      - name: Run all checks (agent + cli + vestad + web)
        run: ./check.sh all

  docker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vestad

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build agent image from checkout
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vestad/Dockerfile
          load: true
          tags: vesta:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build vestad
        working-directory: vestad
        run: cargo build

      # NO retry wrapper on purpose: nightly is where flakiness must surface.
      - name: Run integration tests (no retry)
        run: VESTAD_AGENT_IMAGE=vesta:local ./check.sh integration

      - name: Run Docker unit tests
        run: VESTAD_AGENT_IMAGE=vesta:local ./check.sh vestad-docker

  report-failure:
    needs: [checks, docker-tests]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Create or update nightly failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create nightly-failure --repo "$REPO" \
            --color D93F0B --description "The nightly exhaustive test run failed" --force
          EXISTING=$(gh issue list --repo "$REPO" --label nightly-failure --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body "Nightly run failed again: $RUN_URL"
          else
            gh issue create --repo "$REPO" \
              --title "Nightly test run failed" \
              --label nightly-failure \
              --body "The nightly exhaustive test run failed (flaky or genuinely broken tests on master). See: $RUN_URL"
          fi
