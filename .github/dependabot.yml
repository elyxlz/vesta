version: 2
updates:
  - package-ecosystem: pip
    directory: /agent
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /cli
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /vestad
    schedule:
      interval: weekly
    groups:
      vestad-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
    groups:
      tauri-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps
    schedule:
      interval: weekly
    groups:
      node-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
