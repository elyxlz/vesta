version: 2
updates:
  - package-ecosystem: pip
    directory: /agent/core
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /vestad
    schedule:
      interval: weekly
    groups:
      vestad-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps
    schedule:
      interval: weekly
    groups:
      node-deps:
        patterns: ["*"]
    # Expo SDK owns the versions of its managed packages (React, React Native,
    # Expo, and TypeScript). Keep those aligned across the unified workspace;
    # `expo install --check` advances them when the SDK is upgraded.
    ignore:
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "@expo-google-fonts/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@react-native/*"
      - dependency-name: "@react-native-async-storage/*"
      - dependency-name: "typescript"
      - dependency-name: "@types/react"
      # eslint-config-expo pins the lint stack (eslint and its transitive
      # eslint-plugin-react / typescript-eslint) to the SDK's matrix: SDK 57
      # requires eslint ^9.7. A major of either can't resolve until Expo ships
      # an SDK that accepts it, so majors only yield red PRs (#1380). Ignore
      # majors only; minors, patches, and security still flow.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
